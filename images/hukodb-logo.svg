<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 65" width="280" height="65">
  <defs>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8845C"/>
      <stop offset="100%" stop-color="#7A4A32"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0E4D0"/>
      <stop offset="100%" stop-color="#DCCCB0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8CE890" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8CE890" stop-opacity="0"/>
    </radialGradient>
    <filter id="sporeGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Text "Huk" -->
  <text x="0" y="44" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#D0D0D0" letter-spacing="1">Huk</text>

  <!-- Mushroom cap replacing the "o" -->
  <ellipse cx="98" cy="28" rx="16" ry="11" fill="url(#capGrad)"/>
  <!-- Cap spots -->
  <circle cx="90" cy="24" r="2.5" fill="#D4B88C" opacity="0.8"/>
  <circle cx="100" cy="20" r="2.2" fill="#D4B88C" opacity="0.7"/>
  <circle cx="108" cy="26" r="1.8" fill="#D4B88C" opacity="0.6"/>
  <!-- Stem -->
  <rect x="92" y="36" width="12" height="14" rx="4" fill="url(#stemGrad)"/>
  <!-- Tiny face -->
  <circle cx="93" cy="27" r="1.1" fill="#3A1A0A"/>
  <circle cx="103" cy="27" r="1.1" fill="#3A1A0A"/>
  <ellipse cx="98" cy="32" rx="3" ry="1.5" fill="#3A1A0A" opacity="0.2"/>

  <!-- Text "DB" -->
  <text x="118" y="44" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#D0D0D0" letter-spacing="1">DB</text>

  <!-- Glowing spores floating throughout -->
  <g filter="url(#sporeGlow)">
    <circle cx="18" cy="18" r="1.8" fill="#8CE890" opacity="0.6">
      <animate attributeName="cy" values="18;10;18" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="52" r="1.2" fill="#8CE890" opacity="0.45">
      <animate attributeName="cy" values="52;44;52" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42" cy="14" r="1.5" fill="#A0F0A4" opacity="0.5">
      <animate attributeName="cy" values="14;7;14" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="54" r="1.1" fill="#8CE890" opacity="0.4">
      <animate attributeName="cy" values="54;46;54" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="16" r="1.6" fill="#7CD880" opacity="0.55">
      <animate attributeName="cy" values="16;8;16" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.1;0.55" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="56" r="1.3" fill="#8CE890" opacity="0.4">
      <animate attributeName="cy" values="56;48;56" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="12" r="1.7" fill="#A0F0A4" opacity="0.55">
      <animate attributeName="cy" values="12;5;12" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.1;0.55" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="145" cy="50" r="1.2" fill="#8CE890" opacity="0.4">
      <animate attributeName="cy" values="50;42;50" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="20" r="1.5" fill="#7CD880" opacity="0.5">
      <animate attributeName="cy" values="20;12;20" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="178" cy="54" r="1.1" fill="#8CE890" opacity="0.35">
      <animate attributeName="cy" values="54;46;54" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="205" cy="14" r="1.4" fill="#8CE890" opacity="0.5">
      <animate attributeName="cy" values="14;7;14" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="52" r="1" fill="#8CE890" opacity="0.35">
      <animate attributeName="cy" values="52;45;52" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="18" r="1.3" fill="#A0F0A4" opacity="0.45">
      <animate attributeName="cy" values="18;11;18" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="48" r="1" fill="#8CE890" opacity="0.35">
      <animate attributeName="cy" values="48;41;48" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="2.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
