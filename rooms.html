<h1>Room Search</h1>
<hr>
<div>
    <input type="text" id="room-search" placeholder="Search room names..." autofocus>
    <button id="search-btn">Search</button>
    <span id="status" style="font-size:13px;color:#888;margin-left:10px;"></span>
</div>
<div id="results" style="margin-top:15px;"></div>
<div class="pagination" id="pagination"></div>

<script>
    function isEditor() {
        return sessionStorage.getItem('editor_logged_in') === 'true';
    }
    function hasSession() { return Object.keys(localStorage).some(function(k){return k.startsWith('sb-') && localStorage.getItem(k);}); }
    if (localStorage.getItem('user_logged_in') === 'true' || hasSession()) {
        document.getElementById('login-link').style.display = 'none';
        document.getElementById('signup-link').style.display = 'none';
        document.getElementById('admin-link').style.display = 'inline';
        document.getElementById('logout-link').style.display = 'inline';
    }
    function logout() {
        Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
        sessionStorage.removeItem('editor_logged_in');
        sessionStorage.removeItem('editor_name');
        localStorage.removeItem('user_logged_in');
        localStorage.removeItem('username');
        location.reload();
    }
    if (isEditor()) {
        document.getElementById('editor-dropdown').style.display = 'inline-block';
        document.getElementById('admin-link').style.display = 'inline';
        document.getElementById('logout-link').style.display = 'inline';
        document.getElementById('login-link').style.display = 'none';
    }
</script>

<script type="module">
    const SUPABASE_URL     = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var { data: { session } } = await supabase.auth.getSession();
    if (session && session.user && session.user.email && session.user.email.indexOf('@hukodb.com') === -1) {
        sessionStorage.setItem('editor_logged_in', 'true');
    }

    var PER_PAGE = 50;
    var currentPage = 1;
    var searchQuery = '';
    var allRows = [];
    var resolvedItems = {};
    var resolvedMobs = {};

    function escapeHtml(text) {
        if (!text) return '';
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('search-btn').addEventListener('click', doSearch);
    document.getElementById('room-search').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
        searchQuery = document.getElementById('room-search').value.trim();
        if (!searchQuery) { document.getElementById('results').innerHTML = '<p style="color:#888;">Enter a room name or number to search.</p>'; return; }
        currentPage = 1;
        document.getElementById('status').textContent = 'Searching...';
        var escaped = searchQuery.replace(/'/g, "''");

        // Search rooms_db for matching name or uid (room number)
        var roomQueries = [
            supabase.from('rooms_db').select('area, name, uid').ilike('name', '%' + escaped + '%').limit(200)
        ];
        if (/^\d+$/.test(searchQuery)) {
            roomQueries.push(supabase.from('rooms_db').select('area, name, uid').eq('uid', searchQuery).limit(200));
        }
        var roomResults = await Promise.all(roomQueries);
        var matchedRooms = [];
        roomResults.forEach(function(rs) { if (rs.data) rs.data.forEach(function(r) { matchedRooms.push(r); }); });

        // Deduplicate matched rooms by area+name
        var roomSeen = {};
        var uniqueRooms = matchedRooms.filter(function(r) {
            var key = (r.area || '') + '|' + (r.name || '');
            if (roomSeen[key]) return false;
            roomSeen[key] = true;
            return true;
        });

        // Fetch itemsloc_db rows for each matched room
        var locPromises = [];
        uniqueRooms.forEach(function(r) {
            locPromises.push(
                supabase.from('itemsloc_db').select('*').eq('area', r.area || '').eq('room', r.name || '').limit(200)
            );
        });
        // Also search itemsloc_db directly by room name (handles partial name matches)
        locPromises.push(
            supabase.from('itemsloc_db').select('*').ilike('room', '%' + escaped + '%').limit(500)
        );

        var locResults = await Promise.all(locPromises);
        var seen = {};
        allRows = [];
        locResults.forEach(function(lr) {
            if (lr.data) lr.data.forEach(function(row) {
                var key = (row.area || '') + '|' + (row.room || '') + '|' + (row.mobid || '0') + '|' + (row.itemid || '0');
                if (!seen[key]) { seen[key] = true; allRows.push(row); }
            });
        });

        document.getElementById('status').textContent = allRows.length + ' results (including ' + uniqueRooms.length + ' rooms from rooms_db)';
        var totalPages = Math.ceil(allRows.length / PER_PAGE);
        var start = (currentPage - 1) * PER_PAGE;
        var pageRows = allRows.slice(start, start + PER_PAGE);
        await renderResults(pageRows);
        renderPagination(totalPages);
    }

    async function renderResults(pageRows) {
        var div = document.getElementById('results');
        if (!pageRows || pageRows.length === 0) { div.innerHTML = '<p style="color:#888;">No results found.</p>'; return; }

        // Batch resolve item names and mob names
        var itemIds = [...new Set(pageRows.map(function(x) { return x.itemid; }).filter(Boolean).map(String))];
        var mobIds  = [...new Set(pageRows.map(function(x) { return x.mobid; }).filter(Boolean).map(String))];
        var queries = [];
        if (itemIds.length > 0) queries.push(supabase.from('items_db').select('itemid, name').in('itemid', itemIds));
        if (mobIds.length > 0) queries.push(supabase.from('mobs_db').select('mobid, name').in('mobid', mobIds));
        if (queries.length > 0) {
            var results = await Promise.all(queries);
            var idx = 0;
            if (itemIds.length > 0) {
                (results[idx++].data || []).forEach(function(x) { resolvedItems[String(x.itemid)] = x.name; });
            }
            if (mobIds.length > 0) {
                (results[idx].data || []).forEach(function(x) { resolvedMobs[String(x.mobid)] = x.name; });
            }
        }

        var html = '<div id="room-toolbar"' + (isEditor() ? '' : ' style="display:none;"') + '><button id="delete-selected-room-btn" style="background:#cc3333;color:white;margin-bottom:10px;">Delete Selected</button></div>';
        html += '<table style="width:100%;border-collapse:collapse;">' +
            '<tr>' +
            (isEditor() ? '<th style="width:30px;color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;"><input type="checkbox" id="select-all-room"></th>' : '') +
            '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Zone</th>' +
            '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Room</th>' +
            '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Item</th>' +
            '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Mob</th>' +
            '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Hits</th>' +
            (isEditor() ? '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Actions</th>' : '') +
            '</tr>';

        for (var i = 0; i < pageRows.length; i++) {
            var row = pageRows[i];
            var itemName = resolvedItems[String(row.itemid)] || 'unknown';
            var mobName = resolvedMobs[String(row.mobid)] || '';
            var mobid = row.mobid ? String(row.mobid) : '';
            var rowData = encodeURIComponent(JSON.stringify({ area: row.area, room: row.room, mobid: row.mobid, itemid: row.itemid, hits: row.hits }));
            var rowId = row.id || i;
            html += '<tr' + (isEditor() ? ' class="loc-row" data-row="' + rowData + '"' : '') + '>' +
                (isEditor() ? '<td style="text-align:center;border-bottom:1px solid #333;"><input type="checkbox" class="room-check" value="' + rowId + '"></td>' : '') +
                '<td style="padding:5px;border-bottom:1px solid #333;">' + escapeHtml(row.area || '') + '</td>' +
                '<td style="padding:5px;border-bottom:1px solid #333;">' + escapeHtml(row.room || '') + '</td>' +
                '<td style="padding:5px;border-bottom:1px solid #333;"><a href="item.html?name=' + encodeURIComponent(itemName) + '">' + escapeHtml(itemName) + '</a></td>' +
                '<td style="padding:5px;border-bottom:1px solid #333;">' + (mobid ? '<a href="mob.html?mobid=' + mobid + '">' + escapeHtml(mobName) + '</a>' : '-') + '</td>' +
                '<td style="padding:5px;border-bottom:1px solid #333;">' + (row.hits != null ? row.hits : '') + '</td>' +
                (isEditor() ? '<td style="padding:5px;border-bottom:1px solid #333;"><button class="btn-queue-delete" style="background:#cc3333;color:white;padding:2px 8px;font-size:12px;">Delete</button></td>' : '') +
                '</tr>';
        }
        html += '</table>';
        div.innerHTML = html;

        if (isEditor()) {
            // Check which rows are already queued
            var qr = await supabase.from('deletion_queue').select('row_data').eq('status', 'pending');
            var queuedRows = qr.data || [];
            document.querySelectorAll('.loc-row').forEach(function(tr) {
                var rowData = tr.getAttribute('data-row');
                if (rowData && queuedRows.some(function(q) { return q.row_data && encodeURIComponent(JSON.stringify(q.row_data)) === rowData; })) {
                    tr.style.opacity = '0.3';
                    var btn = tr.querySelector('.btn-queue-delete');
                    if (btn) { btn.textContent = 'Queued'; btn.disabled = true; }
                }
            });
            document.getElementById('select-all-room').addEventListener('change', function() {
                document.querySelectorAll('.room-check').forEach(function(c) { c.checked = this.checked; }, this);
            });
            document.getElementById('delete-selected-room-btn').addEventListener('click', async function() {
                var checked = document.querySelectorAll('.room-check:checked');
                if (checked.length === 0) { alert('Select items to delete.'); return; }
                if (!confirm('Queue ' + checked.length + ' selected location(s) for deletion?')) return;
                for (var j = 0; j < checked.length; j++) {
                    var idx = parseInt(checked[j].value);
                    var row = pageRows[idx];
                    if (!row) continue;
                    var rd = { area: row.area, room: row.room, mobid: row.mobid, itemid: row.itemid, hits: row.hits };
                    await supabase.from('deletion_queue').insert({
                        table_name: 'itemsloc_db',
                        row_data: rd,
                        item_name: resolvedItems[String(row.itemid)] || 'unknown',
                        created_by: localStorage.getItem('username') || 'unknown'
                    });
                }
                loadWholePage();
            });
            document.querySelectorAll('.btn-queue-delete:not([disabled])').forEach(function(btn) {
                btn.addEventListener('click', async function() {
                    var tr = this.closest('tr');
                    var rowData = JSON.parse(decodeURIComponent(tr.getAttribute('data-row')));
                    await supabase.from('deletion_queue').insert({
                        table_name: 'itemsloc_db',
                        row_data: rowData,
                        item_name: resolvedItems[String(rowData.itemid)] || 'unknown',
                        created_by: localStorage.getItem('username') || 'unknown'
                    });
                    tr.style.opacity = '0.3';
                    this.textContent = 'Queued';
                    this.disabled = true;
                });
            });
        }
    }

    async function loadWholePage() {
        var start = (currentPage - 1) * PER_PAGE;
        var pr = allRows.slice(start, start + PER_PAGE);
        await renderResults(pr);
    }

    function renderPagination(total) {
        var div = document.getElementById('pagination');
        if (total <= 1) { div.innerHTML = ''; return; }
        var html = '<span style="color:#888;font-size:13px;">Page ' + currentPage + ' of ' + total + '</span> ';
        html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' class="page-btn" data-page="1">First</button>';
        html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' class="page-btn" data-page="' + (currentPage-1) + '">Prev</button>';
        for (var i = Math.max(1, currentPage-2); i <= Math.min(total, currentPage+2); i++) { html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>'; }
        html += '<button ' + (currentPage === total ? 'disabled' : '') + ' class="page-btn" data-page="' + (currentPage+1) + '">Next</button>';
        html += '<button ' + (currentPage === total ? 'disabled' : '') + ' class="page-btn" data-page="' + total + '">Last</button>';
        div.innerHTML = html;
        div.querySelectorAll('.page-btn').forEach(function(b) { b.addEventListener('click', function() { goToPage(parseInt(this.getAttribute('data-page'))); }); });
    }

    async function goToPage(page) {
        currentPage = page;
        var start = (currentPage - 1) * PER_PAGE;
        var pageRows = allRows.slice(start, start + PER_PAGE);
        await renderResults(pageRows);
        renderPagination(Math.ceil(allRows.length / PER_PAGE));
    }

    document.getElementById('status').textContent = 'Enter a room name or number and press Search.';
</script>
</body>
</html>
