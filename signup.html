<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MUD Equipment DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; text-align: center; }
        a { color: #8787FF; }
        h1, h2 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 0; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        nav .dropbtn { cursor: pointer; color: #8787FF; }
        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }
        nav .dropdown-content a { display: block; padding: 8px 12px; margin: 0; white-space: nowrap; }
        nav .dropdown-content a:hover { background: #444; color: #C0C0C0; }
        nav .dropdown:hover .dropdown-content { display: block; }
        #sticky-header { position: sticky; top: 0; z-index: 100; background: #1a1a1a; }
        input { padding: 8px; width: 250px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; margin: 5px; box-sizing: border-box; }
        button { padding: 8px 16px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; margin: 5px; }
        .error { color: #ff4444; }
        .success { color: #44aa44; }
        .info { color: #888; font-size: 12px; margin: 10px 0; }
    </style>
</head>
<body>
    <div style="margin-bottom:6px;text-align:center;"><img src="images/logo.png" alt="HukoDB" style="height:130px;"></div>
    <div id="sticky-header">
    <nav>
        <a href="index.html">Search</a>
        <a href="zones.html">Zones</a>
        <a href="leaderboard.html">Leaderboard</a>
        <div class="dropdown">
            <span class="dropbtn">Games ▼</span>
            <div class="dropdown-content">
                <a href="daily.html">Daily</a>
                <a href="zonequiz.html">Zone Quiz</a>
                <a href="mobguess.html">Mob Guess</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">Community Tools ▼</span>
            <div class="dropdown-content">
                <a href="market.html">Market</a>
                <a href="lfg.html">LFG</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">More ▼</span>
            <div class="dropdown-content">
                <a href="info.html">About</a>
                <a href="ideas.html">Ideas</a>
            </div>
        </div>
        <div class="dropdown" id="editor-dropdown" style="display:none;">
            <span class="dropbtn">Editor ▼</span>
            <div class="dropdown-content">
                <a href="import.html">Add Equipment</a>
                <a href="batch.html">Batch Import</a>
            </div>
        </div>
        <span id="login-link"><a href="login.html">Login</a></span>
        <span id="signup-link"><a href="signup.html" style="color:#44aa44;">Sign Up</a></span>
        <span id="admin-link" style="display:none;"><a href="admin.html" style="color:#FFD700;font-weight:bold;">Admin Panel</a></span>
        <span id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></span>
    </nav>
    <script>document.querySelectorAll('nav a').forEach(function(a){if(a.href.split('/').pop()===location.pathname.split('/').pop())a.style.color='#00FFFF';});</script>
    </div>

    <h2>Create Account</h2>
    <hr>

    <p class="info">No email required. Pick a username and password.</p>

    <p id="message"></p>

    <div>
        <input type="text" id="username" placeholder="Username" maxlength="30" autocomplete="off">
        <br>
        <input type="password" id="password" placeholder="Password (min 6 characters)" minlength="6">
        <br>
        <input type="password" id="confirm" placeholder="Confirm password">
        <br>
        <button id="signup-btn">Create Account</button>
    </div>

    <p style="margin-top:15px;font-size:13px;">Already have an account? <a href="login.html">Login</a></p>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('signup-btn').addEventListener('click', async function() {
            var msg = document.getElementById('message');
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm').value;

            if (!username || username.length < 2) { msg.innerHTML = '<span class="error">Username must be at least 2 characters.</span>'; return; }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) { msg.innerHTML = '<span class="error">Username can only contain letters, numbers, and underscores.</span>'; return; }
            if (password.length < 6) { msg.innerHTML = '<span class="error">Password must be at least 6 characters.</span>'; return; }
            if (password !== confirm) { msg.innerHTML = '<span class="error">Passwords do not match.</span>'; return; }

            msg.innerHTML = '<span style="color:#888;">Creating account...</span>';

            var email = username + '@hukodb.com';
            var result = await supabase.auth.signUp({ email: email, password: password });

            if (result.error) {
                if (result.error.message.includes('already registered') || result.error.message.includes('Database error saving new user')) {
                    msg.innerHTML = '<span class="error">Username already taken.</span>';
                } else {
                    msg.innerHTML = '<span class="error">' + result.error.message + '</span>';
                }
                return;
            }

            await supabase.from('accounts').insert({ username: username }).catch(function(){});

            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('username', username);
            msg.innerHTML = '<span class="success">Account created! Welcome, ' + username + '.</span>';
            document.getElementById('signup-btn').disabled = true;
            setTimeout(function() { window.location.href = 'index.html'; }, 1500);
        });
    </script>

    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
        }
        if (localStorage.getItem('user_logged_in') === 'true') {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
        }
        window.logout = function() {
            supabase.auth.signOut().then(function() {
                sessionStorage.removeItem('editor_logged_in');
                localStorage.removeItem('user_logged_in');
                localStorage.removeItem('username');
                location.reload();
            });
        }
    </script>
</body>
</html>
