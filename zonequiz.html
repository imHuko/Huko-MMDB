<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Quiz - MUD Equipment DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1, h2 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 0; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        nav .dropbtn { cursor: pointer; color: #8787FF; }
        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }
        nav .dropdown-content a { display: block; padding: 8px 12px; margin: 0; white-space: nowrap; }
        nav .dropdown-content a:hover { background: #444; color: #C0C0C0; }
        nav .dropdown:hover .dropdown-content { display: block; }
        #sticky-header { position: sticky; top: 0; z-index: 100; background: #1a1a1a; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin: -10px 0 20px; }
        hr { border-color: #333; }
        .stats-row { display: flex; gap: 12px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .stat-box { background: #222; padding: 10px 18px; border-radius: 5px; text-align: center; border: 1px solid #333; }
        .stat-box .num { font-size: 22px; font-weight: bold; color: #8787FF; }
        .stat-box .lbl { font-size: 11px; color: #555; }
        .question-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 20px; margin: 15px 0; text-align: center; }
        .question-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .question-item { font-size: 20px; color: #C0C0C0; font-weight: bold; margin: 10px 0; }
        .question-hint { font-size: 12px; color: #555; margin-top: 8px; }
        .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .choice-btn { padding: 12px 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: #ccc; cursor: pointer; font-size: 13px; text-align: center; }
        .choice-btn:hover:not(:disabled) { background: #333; border-color: #8787FF; color: #fff; }
        .choice-btn:disabled { cursor: not-allowed; }
        .choice-btn.correct { background: #1a3a1a; border-color: #44aa44; color: #88ff88; }
        .choice-btn.wrong   { background: #2a1a1a; border-color: #ff4444; color: #ff8888; }
        .choice-btn.reveal  { background: #1a3a1a; border-color: #44aa44; color: #88ff88; opacity: 0.7; }
        .feedback { text-align: center; font-size: 16px; min-height: 28px; margin: 8px 0; font-weight: bold; }
        .feedback.correct { color: #44aa44; }
        .feedback.wrong   { color: #ff4444; }
        .next-row { text-align: center; margin: 10px 0; }
        .next-row button { padding: 10px 30px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .score-bar-wrap { background: #333; border-radius: 3px; height: 6px; margin: 8px 0; }
        .score-bar { background: #8787FF; height: 6px; border-radius: 3px; transition: width 0.3s; }
        .diff-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .diff-btn { padding: 5px 14px; background: #333; border: 1px solid #444; border-radius: 3px; color: #888; cursor: pointer; font-size: 12px; }
        .diff-btn.active { background: #8787FF; color: #000; border-color: #8787FF; }
        .game-over { text-align: center; background: #222; border-radius: 8px; padding: 25px; margin: 15px 0; border: 2px solid #8787FF; }
        .game-over h2 { color: #C0C0C0; margin: 0 0 10px; }
        .game-over .final-score { font-size: 36px; font-weight: bold; color: #8787FF; }
        .game-over .grade { font-size: 18px; margin: 5px 0; }
        .empty { text-align: center; color: #555; padding: 40px 0; }
        .streak-badge { display: inline-block; background: #ffaa00; color: #000; border-radius: 3px; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-left: 8px; }
    </style>
</head>
<body>
    <div style="margin-bottom:6px;text-align:center;"><img src="images/logo.png" alt="HukoDB" style="height:130px;"></div>
    <div id="sticky-header">
    <nav>
        <a href="index.html">Search</a>
        <a href="zones.html">Zones</a>
        <a href="leaderboard.html">Leaderboard</a>
        <div class="dropdown">
            <span class="dropbtn">Games ▼</span>
            <div class="dropdown-content">
                <a href="daily.html">Daily</a>
                <a href="zonequiz.html">Zone Quiz</a>
                <a href="mobguess.html">Mob Guess</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">Community Tools ▼</span>
            <div class="dropdown-content">
                <a href="market.html">Market</a>
                <a href="lfg.html">LFG</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">More ▼</span>
            <div class="dropdown-content">
                <a href="info.html">About</a>
                <a href="ideas.html">Ideas</a>
            </div>
        </div>
        <div class="dropdown" id="editor-dropdown" style="display:none;">
            <span class="dropbtn">Editor ▼</span>
            <div class="dropdown-content">
                <a href="import.html">Add Equipment</a>
                <a href="batch.html">Batch Import</a>
            </div>
        </div>
        <span id="login-link"><a href="login.html">Login</a></span>
        <span id="signup-link"><a href="signup.html" style="color:#44aa44;">Sign Up</a></span>
        <span id="admin-link" style="display:none;"><a href="admin.html" style="color:#FFD700;font-weight:bold;">Admin Panel</a></span>
        <span id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></span>
    </nav>
    <script>document.querySelectorAll('nav a').forEach(function(a){if(a.href&&a.href.split('/').pop()===location.pathname.split('/').pop())a.style.color='#00FFFF';});</script>
    </div>

    <h2>Zone Quiz</h2>
    <p class="subtitle">Which zone does this item drop in?</p>

    <div class="stats-row">
        <div class="stat-box"><div class="num" id="score-num">0</div><div class="lbl">Score</div></div>
        <div class="stat-box"><div class="num" id="streak-num">0</div><div class="lbl">Streak</div></div>
        <div class="stat-box"><div class="num" id="best-num">0</div><div class="lbl">Best</div></div>
        <div class="stat-box"><div class="num" id="q-num">0/10</div><div class="lbl">Question</div></div>
    </div>

    <div class="diff-row">
        <button class="diff-btn active" id="diff-easy"   onclick="setDiff('easy')">Easy (4 choices)</button>
        <button class="diff-btn"        id="diff-medium" onclick="setDiff('medium')">Medium (6 choices)</button>
        <button class="diff-btn"        id="diff-hard"   onclick="setDiff('hard')">Hard (8 choices)</button>
    </div>

    <div id="game-area"><p class="empty">Loading quiz data...</p></div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var TOTAL_QUESTIONS = 10;
        var DIFF_CHOICES = { easy: 4, medium: 6, hard: 8 };
        var diff = 'easy';

        var pool = [];
        var zones = [];
        var questions = [];
        var qIndex = 0;
        var score = 0;
        var streak = 0;
        var best = parseInt(localStorage.getItem('zonequiz_best') || '0');
        var answered = false;

        window.setDiff = function(d) {
            diff = d;
            document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('diff-' + d).classList.add('active');
            if (pool.length > 0) startRound();
        };

        async function loadData() {
            document.getElementById('game-area').innerHTML = '<p class="empty">Loading...</p>';

            var result = await supabase.rpc('get_quiz_items');

            if (!result.data || result.data.length < 20) {
                var r = await supabase.from('itemsloc_db')
                    .select('itemid, area')
                    .not('area', 'is', null)
                    .neq('area', '')
                    .neq('area', '-')
                    .limit(5000);

                var byItem = {};
                (r.data || []).forEach(function(row) {
                    if (!byItem[row.itemid]) byItem[row.itemid] = new Set();
                    byItem[row.itemid].add(row.area);
                });

                var singleZoneIds = Object.keys(byItem).filter(function(id) { return byItem[id].size === 1; });
                var nameMap = {};
                for (var i = 0; i < singleZoneIds.length; i += 200) {
                    var batch = singleZoneIds.slice(i, i + 200);
                    var nr = await supabase.from('items_db').select('itemid, name').in('itemid', batch);
                    (nr.data || []).forEach(function(row) { nameMap[String(row.itemid)] = row.name; });
                }

                pool = [];
                singleZoneIds.forEach(function(id) {
                    var name = nameMap[id];
                    if (name && !name.includes('corpse') && !name.includes('gold coins') && name.length < 50) {
                        pool.push({ name: name, zone: Array.from(byItem[id])[0] });
                    }
                });

                zones = [...new Set(pool.map(function(p) { return p.zone; }))].sort();
            } else {
                pool = result.data.filter(function(r) {
                    return r.name && !r.name.includes('corpse') && !r.name.includes('gold coins') && r.name.length < 50;
                });
                zones = [...new Set(pool.map(function(p) { return p.zone; }))].sort();
            }

            document.getElementById('best-num').textContent = best;
            startRound();
        }

        function startRound() {
            score = 0;
            streak = 0;
            qIndex = 0;
            questions = buildQuestions();
            updateStats();
            nextQuestion();
        }

        function buildQuestions() {
            var shuffled = pool.slice().sort(function() { return Math.random() - 0.5; });
            return shuffled.slice(0, TOTAL_QUESTIONS);
        }

        function nextQuestion() {
            if (qIndex >= TOTAL_QUESTIONS) {
                showGameOver();
                return;
            }

            answered = false;
            var q = questions[qIndex];
            var numChoices = DIFF_CHOICES[diff];

            var wrongZones = zones.filter(function(z) { return z !== q.zone; });
            wrongZones.sort(function() { return Math.random() - 0.5; });
            var choices = [q.zone].concat(wrongZones.slice(0, numChoices - 1));
            choices.sort(function() { return Math.random() - 0.5; });

            renderQuestion(q, choices);
        }

        function renderQuestion(q, choices) {
            var area = document.getElementById('game-area');
            area.innerHTML = '';

            var progWrap = document.createElement('div');
            progWrap.className = 'score-bar-wrap';
            var progBar = document.createElement('div');
            progBar.className = 'score-bar';
            progBar.style.width = (qIndex / TOTAL_QUESTIONS * 100) + '%';
            progWrap.appendChild(progBar);
            area.appendChild(progWrap);

            var card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = '<div class="question-label">Which zone does this item drop in?</div>'
                + '<div class="question-item">' + escHtml(q.name) + '</div>'
                + '<div class="question-hint"><a href="item.html?name=' + encodeURIComponent(q.name) + '" target="_blank" style="color:#555;font-size:11px;">View item &#8594;</a></div>';
            area.appendChild(card);

            var feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.id = 'feedback';
            area.appendChild(feedback);

            var grid = document.createElement('div');
            grid.className = 'choices';
            choices.forEach(function(zone) {
                var btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = zone;
                btn.addEventListener('click', function() { handleChoice(zone, q.zone, choices); });
                grid.appendChild(btn);
            });
            area.appendChild(grid);

            var nextRow = document.createElement('div');
            nextRow.className = 'next-row';
            nextRow.id = 'next-row';
            nextRow.style.display = 'none';
            var nextBtn = document.createElement('button');
            nextBtn.textContent = qIndex === TOTAL_QUESTIONS - 1 ? 'See Results' : 'Next &#8594;';
            nextBtn.addEventListener('click', function() {
                qIndex++;
                nextQuestion();
            });
            nextRow.appendChild(nextBtn);
            area.appendChild(nextRow);
        }

        function handleChoice(chosen, correct, choices) {
            if (answered) return;
            answered = true;

            var isCorrect = chosen === correct;
            var feedback = document.getElementById('feedback');

            document.querySelectorAll('.choice-btn').forEach(function(btn) {
                btn.disabled = true;
                if (btn.textContent === correct) {
                    btn.className = 'choice-btn ' + (isCorrect ? 'correct' : 'reveal');
                } else if (btn.textContent === chosen && !isCorrect) {
                    btn.className = 'choice-btn wrong';
                }
            });

            if (isCorrect) {
                score++;
                streak++;
                feedback.className = 'feedback correct';
                feedback.innerHTML = '&#10003; Correct!' + (streak >= 3 ? ' <span class="streak-badge">&#128293; ' + streak + ' streak</span>' : '');
            } else {
                streak = 0;
                feedback.className = 'feedback wrong';
                feedback.textContent = '&#10007; It was ' + correct;
            }

            updateStats();
            document.getElementById('next-row').style.display = 'block';
        }

        function showGameOver() {
            var pct = Math.round(score / TOTAL_QUESTIONS * 100);
            var grade = pct >= 90 ? 'Sporefolk Master!' : pct >= 70 ? 'Seasoned Adventurer' : pct >= 50 ? 'Getting there...' : 'Keep exploring!';

            if (score > best) {
                best = score;
                localStorage.setItem('zonequiz_best', best);
                document.getElementById('best-num').textContent = best;
            }

            var area = document.getElementById('game-area');
            area.innerHTML = '';

            var box = document.createElement('div');
            box.className = 'game-over';
            box.innerHTML = '<h2>Round Complete!</h2>'
                + '<div class="final-score">' + score + ' / ' + TOTAL_QUESTIONS + '</div>'
                + '<div class="grade">' + grade + '</div>';

            var playAgain = document.createElement('button');
            playAgain.style.cssText = 'margin-top:15px;padding:10px 30px;background:#8787FF;color:#000;border:none;border-radius:3px;cursor:pointer;font-size:14px;font-weight:bold;';
            playAgain.textContent = 'Play Again';
            playAgain.addEventListener('click', startRound);
            box.appendChild(playAgain);
            area.appendChild(box);
        }

        function updateStats() {
            document.getElementById('score-num').textContent  = score;
            document.getElementById('streak-num').textContent = streak;
            document.getElementById('best-num').textContent   = best;
            document.getElementById('q-num').textContent      = (qIndex + 1) + '/' + TOTAL_QUESTIONS;
        }

        function escHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        loadData();
    </script>

    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
        }
        if (localStorage.getItem('user_logged_in') === 'true') {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
        }
        function logout() {
            Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    </script>
</body>
</html>
