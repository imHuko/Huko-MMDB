<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributor - MUD Equipment DB</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1, h2 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; }
        nav a { margin-right: 15px; }
        .stat-row { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { background: #222; padding: 15px 25px; border-radius: 5px; text-align: center; min-width: 100px; }
        .stat-box .num { font-size: 28px; font-weight: bold; color: #C0C0C0; }
        .stat-box .label { font-size: 12px; color: #888; margin-top: 4px; }
        .stat-box.green .num { color: #44aa44; }
        .stat-box.yellow .num { color: #ffaa00; }
        .stat-box.gray .num { color: #888; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #333; padding: 8px 10px; text-align: left; font-size: 13px; }
        th { background: #222; color: #888; }
        tr:hover { background: #222; }
        .badge-eqdb { color: #44aa44; font-size: 11px; font-weight: bold; }
        .badge-personal { color: #ffaa00; font-size: 11px; }
        .badge-active { color: #44aa44; }
        .badge-superseded { color: #888; font-style: italic; }
        .search-row { display: flex; gap: 8px; margin: 20px 0; }
        .search-row input { padding: 8px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; width: 250px; }
        .search-row button { padding: 8px 16px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; }
        .empty { color: #888; font-style: italic; padding: 20px 0; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Search</a>
        <a href="info.html">About</a>
        <span id="editor-links" style="display:none;">
            <a href="admin.html">Admin</a>
        </span>
    </nav>
    <hr>

    <!-- Lookup form (shown when no name in URL) -->
    <div id="lookup-section">
        <h1>Contributor Profile</h1>
        <p>Enter a contributor name to see their submission history.</p>
        <div class="search-row">
            <input type="text" id="name-input" placeholder="Character name...">
            <button id="lookup-btn">Look Up</button>
        </div>
    </div>

    <!-- Profile (shown when name is found) -->
    <div id="profile-section" style="display:none;">
        <h1 id="profile-name"></h1>

        <div class="stat-row">
            <div class="stat-box">
                <div class="num" id="stat-total">-</div>
                <div class="label">Total Submissions</div>
            </div>
            <div class="stat-box green">
                <div class="num" id="stat-active">-</div>
                <div class="label">Still Active</div>
            </div>
            <div class="stat-box yellow">
                <div class="num" id="stat-eqdb">-</div>
                <div class="label">EQDB Items</div>
            </div>
            <div class="stat-box gray">
                <div class="num" id="stat-superseded">-</div>
                <div class="label">Superseded by EQDB</div>
            </div>
        </div>

        <h2>Submission History</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Source</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Submitted</th>
                </tr>
            </thead>
            <tbody id="submissions-table"></tbody>
        </table>
        <p id="empty-msg" class="empty" style="display:none;">No submissions found.</p>
    </div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check URL for ?name=
        var params = new URLSearchParams(window.location.search);
        var nameParam = params.get('name');
        if (nameParam) loadProfile(nameParam);

        document.getElementById('lookup-btn').addEventListener('click', function() {
            var name = document.getElementById('name-input').value.trim();
            if (name) loadProfile(name);
        });
        document.getElementById('name-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('lookup-btn').click();
        });

        async function loadProfile(name) {
            // Update URL so it's shareable
            history.replaceState(null, '', 'contributor.html?name=' + encodeURIComponent(name));

            var result = await supabase
                .from('submission_history')
                .select('*')
                .ilike('submitter', name)
                .order('created_at', { ascending: false });

            var rows = result.data || [];

            document.getElementById('lookup-section').style.display = 'none';
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('profile-name').textContent = name;

            var total      = rows.length;
            var active     = rows.filter(function(r) { return r.status === 'active'; }).length;
            var eqdb       = rows.filter(function(r) { return r.is_eqdb; }).length;
            var superseded = rows.filter(function(r) { return r.status === 'superseded'; }).length;

            document.getElementById('stat-total').textContent      = total;
            document.getElementById('stat-active').textContent     = active;
            document.getElementById('stat-eqdb').textContent       = eqdb;
            document.getElementById('stat-superseded').textContent = superseded;

            var tbody = document.getElementById('submissions-table');

            if (rows.length === 0) {
                tbody.innerHTML = '';
                document.getElementById('empty-msg').style.display = 'block';
                return;
            }

            document.getElementById('empty-msg').style.display = 'none';

            var html = '';
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var date = new Date(r.created_at).toLocaleDateString();

                var typeLabel = r.is_eqdb
                    ? '<span class="badge-eqdb">EQDB</span>'
                    : '<span class="badge-personal">Personal</span>';

                var statusLabel = r.status === 'active'
                    ? '<span class="badge-active">✔ Active</span>'
                    : '<span class="badge-superseded">↑ Superseded by EQDB</span>';

                html += '<tr>';
                html += '<td><a href="item.html?name=' + encodeURIComponent(r.item_name) + '">' + escapeHtml(r.item_name) + '</a></td>';
                html += '<td>' + escapeHtml(r.source || '') + '</td>';
                html += '<td>' + typeLabel + '</td>';
                html += '<td>' + statusLabel + '</td>';
                html += '<td>' + date + '</td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-links').style.display = 'inline';
        }
    </script>
</body>
</html>
