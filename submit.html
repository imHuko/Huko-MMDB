<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Item - HukoDB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        textarea { width: 100%; height: 300px; background: #2a2a2a; color: #ccc; border: 1px solid #555; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: vertical; }
        button { padding: 12px 24px; background: #8787FF; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 10px; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .note { color: #888; font-size: 13px; margin: 10px 0; }
        .success { color: #44aa44; text-align: center; padding: 30px; background: #1a2a1a; border: 1px solid #44aa44; border-radius: 5px; margin: 20px 0; }
        .error { color: #ff4444; text-align: center; padding: 10px; }
        hr { border-color: #333; }
    </style>
</head>
<body>
    <div style="margin-bottom:6px;text-align:center;"><a href="index.html" style="text-decoration:none;"><img src="images/logo.png" alt="HukoDB" style="height:130px;cursor:pointer;"></a></div>
    <nav>
        <a href="index.html">Search</a>
        <a href="daily.html">Daily</a>
    </nav>

    <h1>Submit Item for Review</h1>
    <p class="note">Paste the item output from the MUD below. An admin will review and add it to the database.</p>

    <div id="form-area">
        <textarea id="item-text" placeholder="Paste item text here..."></textarea>
        <br>
        <button id="submit-btn" onclick="submitItem()">Submit</button>
        <div id="msg"></div>
    </div>

    <div id="result-area" style="display:none;"></div>

    <script>
        function submitItem() {
            var text = document.getElementById('item-text').value.trim();
            if (!text) { document.getElementById('msg').textContent = 'Please paste item text first.'; return; }
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('msg').textContent = '';

            // Store in localStorage queue for now
            var queue = JSON.parse(localStorage.getItem('hukodb_pending') || '[]');
            queue.push({ text: text, submitted: new Date().toISOString() });
            localStorage.setItem('hukodb_pending', JSON.stringify(queue));

            document.getElementById('form-area').style.display = 'none';
            document.getElementById('result-area').innerHTML = '<div class="success"><h2>Submitted!</h2><p>Your item has been queued for admin review.</p><p style="margin-top:15px;"><a href="#" onclick="resetForm()">Submit another</a></p></div>';
            document.getElementById('result-area').style.display = 'block';
        }

        function resetForm() {
            document.getElementById('item-text').value = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('msg').textContent = '';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('form-area').style.display = 'block';
        }
    </script>
</body>
</html>
