    <div id="mob-details">Loading...</div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        var params = new URLSearchParams(window.location.search);
        var mobId = params.get('mobid');
        
        if (!mobId) {
            document.getElementById('mob-details').innerHTML = '<p>No mob specified.</p>';
        } else {
            loadMob();
        }
        
        async function loadMob() {
            // Get mob name
            var mobResult = await supabase.from('mobs_db').select('*').eq('mobid', mobId).limit(1);
            var mob = mobResult.data && mobResult.data.length > 0 ? mobResult.data[0] : null;
            var mobName = mob ? mob.name : ('Mob #' + mobId);
            
            var html = '<h1>' + escapeHtml(mobName) + '</h1>';
            
            if (mob && mob.long_desc) {
                html += '<p style="color:#888;">' + escapeHtml(mob.long_desc) + '</p>';
            }
            
            // Get spawn locations
            var locResult = await supabase.from('mobsloc_db').select('area, room, hits').eq('mobid', mobId).order('area', { ascending: true }).limit(200);
            
            if (locResult.data && locResult.data.length > 0) {
                html += '<h2 style="color:#C0C0C0;margin-top:20px;">Spawn Locations (' + locResult.data.length + ')</h2>';
                html += '<table>';
                html += '<tr><th>Zone</th><th>Room</th><th>Hits</th></tr>';
                
                for (var i = 0; i < locResult.data.length; i++) {
                    var loc = locResult.data[i];
                    html += '<tr>';
                    html += '<td>' + escapeHtml(loc.area || '') + '</td>';
                    html += '<td>' + (loc.room ? escapeHtml(String(loc.room)) : '-') + '</td>';
                    html += '<td>' + (loc.hits ? escapeHtml(String(loc.hits)) : '-') + '</td>';
                    html += '</tr>';
                }
                html += '</table>';
            } else {
                html += '<p>No spawn locations found.</p>';
            }
            
            // Get items dropped by this mob
            var itemsResult = await supabase.from('itemsloc_db').select('itemid, area, room').eq('mobid', mobId).limit(100);
            
            if (itemsResult.data && itemsResult.data.length > 0) {
                // Get item names
                var itemIds = [];
                for (var i = 0; i < itemsResult.data.length; i++) {
                    itemIds.push(String(itemsResult.data[i].itemid));
                }
                
                var namesResult = await supabase.from('items_db').select('itemid, name').in('itemid', itemIds.slice(0, 50));
                var nameMap = {};
                if (namesResult.data) {
                    for (var n = 0; n < namesResult.data.length; n++) {
                        nameMap[String(namesResult.data[n].itemid)] = namesResult.data[n].name;
                    }
                }
                
                html += '<h2 style="color:#C0C0C0;margin-top:20px;">Items Dropped (' + itemsResult.data.length + ')</h2>';
                html += '<table>';
                html += '<tr><th>Item</th><th>Zone</th><th>Room</th></tr>';
                
                for (var d = 0; d < itemsResult.data.length; d++) {
                    var drop = itemsResult.data[d];
                    var itemName = nameMap[String(drop.itemid)] || ('Item #' + drop.itemid);
                    html += '<tr>';
                    html += '<td><a href="item.html?name=' + encodeURIComponent(itemName) + '">' + escapeHtml(itemName) + '</a></td>';
                    html += '<td>' + escapeHtml(drop.area || '') + '</td>';
                    html += '<td>' + (drop.room ? escapeHtml(String(drop.room)) : '-') + '</td>';
                    html += '</tr>';
                }
                html += '</table>';
            }
            
            document.getElementById('mob-details').innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
		function isEditor() {
    return sessionStorage.getItem('editor_logged_in') === 'true';
}
    </script>
    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-links').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
        }
        function logout() { sessionStorage.removeItem('editor_logged_in'); location.reload(); }
    </script>
