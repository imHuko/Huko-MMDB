    <div style="color:#888;font-size:13px;margin-bottom:10px;">

    <div id="mob-details">Loading...</div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        var params = new URLSearchParams(window.location.search);
        var mobId = params.get('mobid');
        
        if (!mobId) {
            document.getElementById('mob-details').innerHTML = '<p>No mob specified.</p>';
        } else {
            loadMob();
        }
        
        async function loadMob() {
            // Fire mob lookup and integer-ID locations in parallel
            var [mobResult, intLocResult] = await Promise.all([
                supabase.from('mobs_db').select('*').eq('mobid', mobId).limit(1),
                supabase.from('mobsloc_db').select('area, room, hits').eq('mobid', String(mobId)).limit(500)
            ]);

            var mob = mobResult.data && mobResult.data.length > 0 ? mobResult.data[0] : null;
            var mobName = mob ? mob.name : ('Mob #' + mobId);

            var html = '<h1>' + escapeHtml(mobName) + '</h1>';
            if (mob && mob.long_desc) {
                html += '<p style="color:#888;">' + escapeHtml(mob.long_desc) + '</p>';
            }

            // Now find hash IDs matching this mob name and fetch their locations — also parallel
            var allMobIds = [String(mobId)];
            var hashLocs = [];
            if (mobName && mobName !== ('Mob #' + mobId)) {
                var hashResult = await supabase.from('mobs_db').select('mobid').ilike('name', mobName).filter('mobid', 'neq', String(mobId));
                if (hashResult.data && hashResult.data.length > 0) {
                    var hashIds = hashResult.data.map(function(r) { return String(r.mobid); });
                    allMobIds = allMobIds.concat(hashIds);
                    var hashLocResult = await supabase.from('mobsloc_db').select('area, room, hits').in('mobid', hashIds).limit(500);
                    hashLocs = hashLocResult.data || [];
                }
            }

            // Merge integer and hash location rows, and fire items query in parallel
            var allLocs = (intLocResult.data || []).concat(hashLocs);
            var locResult = { data: allLocs };
            // Start items query now — we have allMobIds and don't need to wait for location render
            var itemsPromise = supabase.from('itemsloc_db').select('itemid, area, room').in('mobid', allMobIds).limit(200);
            var allLocs = locResult.data || [];

            // Deduplicate by area+room, keeping highest hits
            var locMap = {};
            for (var i = 0; i < allLocs.length; i++) {
                var loc = allLocs[i];
                var key = (loc.area || '') + '|' + (loc.room || '');
                if (!locMap[key] || (loc.hits || 0) > (locMap[key].hits || 0)) {
                    locMap[key] = loc;
                }
            }
            var uniqueLocs = Object.values(locMap);
            // Sort by hits descending
            uniqueLocs.sort(function(a, b) { return (b.hits || 0) - (a.hits || 0); });

            // Filter out rows where room is '-' or empty if better data exists
            var hasRealRooms = uniqueLocs.some(function(l) { return l.room && l.room !== '-'; });
            if (hasRealRooms) {
                uniqueLocs = uniqueLocs.filter(function(l) { return l.room && l.room !== '-'; });
            }

            if (uniqueLocs.length > 0) {
                // Look up room numbers from rooms_db
                var roomNumMap = {};
                var namedRooms = uniqueLocs.filter(function(l) { return l.room && l.room !== '-' && l.area; });
                if (namedRooms.length > 0) {
                    var roomNames = [...new Set(namedRooms.map(function(l) { return l.room; }))];
                    var roomAreas = [...new Set(namedRooms.map(function(l) { return l.area; }))];
                    var roomsResult = await supabase.from('rooms_db')
                        .select('uid, name, area')
                        .in('name', roomNames)
                        .in('area', roomAreas)
                        .limit(500);
                    if (roomsResult.data) {
                        roomsResult.data.forEach(function(r) {
                            var key = (r.area || '') + '|' + (r.name || '');
                            if (!roomNumMap[key]) roomNumMap[key] = String(r.uid);
                        });
                    }
                }

                html += '<h2 style="color:#C0C0C0;margin-top:20px;">Spawn Locations (' + uniqueLocs.length + ')</h2>';
                html += '<p style="font-size:12px;color:#888;">🟢 5+ hits = confirmed | 🟡 2-4 hits = likely | 🔴 1 hit = rare</p>';
                html += '<table>';
                html += '<tr><th>Zone</th><th>Room</th><th>Room #</th><th>Hits</th></tr>';
                for (var i = 0; i < uniqueLocs.length; i++) {
                    var loc = uniqueLocs[i];
                    var roomKey = (loc.area || '') + '|' + (loc.room || '');
                    var roomNum = roomNumMap[roomKey] || '';
                    html += '<tr>';
                    html += '<td>' + escapeHtml(loc.area || '') + '</td>';
                    html += '<td>' + escapeHtml(loc.room || '-') + '</td>';
                    html += '<td>' + (roomNum || '-') + '</td>';
                    html += '<td>' + hitBadge(loc.hits) + '</td>';
                    html += '</tr>';
                }
                html += '</table>';
            } else {
                html += '<p>No spawn locations found.</p>';
            }

            // Await the items query we already started above
            var itemsResult = await itemsPromise;
            var allDrops = itemsResult.data || [];

            // Deduplicate drops by itemid
            var dropMap = {};
            for (var d = 0; d < allDrops.length; d++) {
                var drop = allDrops[d];
                if (!dropMap[String(drop.itemid)]) dropMap[String(drop.itemid)] = drop;
            }
            var uniqueDrops = Object.values(dropMap);

            if (uniqueDrops.length > 0) {
                var itemIds = uniqueDrops.map(function(d) { return String(d.itemid); });
                var namesResult = await supabase.from('items_db').select('itemid, name').in('itemid', itemIds.slice(0, 100));
                var nameMap = {};
                if (namesResult.data) {
                    for (var n = 0; n < namesResult.data.length; n++) {
                        nameMap[String(namesResult.data[n].itemid)] = namesResult.data[n].name;
                    }
                }

                html += '<h2 style="color:#C0C0C0;margin-top:20px;">Items Dropped (' + uniqueDrops.length + ')</h2>';
                html += '<table>';
                html += '<tr><th>Item</th><th>Zone</th><th>Room</th></tr>';
                for (var d = 0; d < uniqueDrops.length; d++) {
                    var drop = uniqueDrops[d];
                    var itemName = nameMap[String(drop.itemid)] || ('Item #' + drop.itemid);
                    html += '<tr>';
                    html += '<td><a href="item.html?name=' + encodeURIComponent(itemName) + '">' + escapeHtml(itemName) + '</a></td>';
                    html += '<td>' + escapeHtml(drop.area || '') + '</td>';
                    html += '<td>' + escapeHtml(drop.room && drop.room !== '-' ? drop.room : '-') + '</td>';
                    html += '</tr>';
                }
                html += '</table>';
            }

            document.getElementById('mob-details').innerHTML = html;
            document.getElementById('breadcrumb-mob').textContent = escapeHtml(mobName);
        }

        function hitBadge(hits) {
            var n = hits ? parseInt(hits) : 0;
            if (n >= 5)  return '<span style="color:#44aa44;font-weight:bold;">' + n + '</span>';
            if (n >= 2)  return '<span style="color:#ffaa00;">' + n + '</span>';
            if (n === 1) return '<span style="color:#ff4444;">' + n + '</span>';
            return '-';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
		function isEditor() {
    return sessionStorage.getItem('editor_logged_in') === 'true';
}
    </script>
    <script>
        function hasSession() { return Object.keys(localStorage).some(function(k){return k.startsWith('sb-') && localStorage.getItem(k);}); }
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
        }
        if (localStorage.getItem('user_logged_in') === 'true' || hasSession()) {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
        }
        function logout() {
            Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    </script>
<style>
#bug-btn-container{text-align:center;padding:10px 0;margin-top:20px;}
#bug-btn{background:#ff4444;color:white;border:none;border-radius:3px;padding:8px 16px;cursor:pointer;font-size:13px;}
#bug-btn:hover{background:#cc0000;}
#bug-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:none;align-items:center;justify-content:center;}
#bug-modal-content{background:#1a1a1a;border:2px solid #555;border-radius:10px;padding:20px;width:90%;max-width:500px;color:#ccc;}
#bug-modal-content h3{margin:0 0 10px;color:#ff4444;}
#bug-modal-content textarea{width:100%;height:120px;padding:8px;background:#333;color:#ccc;border:1px solid #555;border-radius:3px;box-sizing:border-box;margin:10px 0;font-family:Arial,sans-serif;}
#bug-modal-content .bug-url{color:#888;font-size:12px;word-break:break-all;}
#bug-modal-content .btn-row{display:flex;gap:10px;justify-content:flex-end;}
#bug-modal-content .btn-submit{background:#ff4444;color:white;border:none;border-radius:3px;padding:8px 16px;cursor:pointer;}
#bug-modal-content .btn-cancel{background:#666;color:white;border:none;border-radius:3px;padding:8px 16px;cursor:pointer;}
#bug-modal-content .btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
#bug-modal-content .bug-msg{margin:10px 0 0;font-size:13px;}
</style>
<div id="bug-btn-container"><button id="bug-btn" onclick="openBugReport()">Report Bug</button></div>
<div id="bug-modal" onclick="if(event.target===this)closeBugReport()">
  <div id="bug-modal-content">
    <h3>Report Bug</h3>
    <p class="bug-url">Page: <span id="bug-page-url"></span></p>
    <textarea id="bug-description" placeholder="Describe what went wrong..."></textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeBugReport()">Cancel</button>
      <button class="btn-submit" id="bug-submit-btn" onclick="submitBugReport()">Submit</button>
    </div>
    <p class="bug-msg" id="bug-msg"></p>
  </div>
</div>
<script>
    var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
    window.openBugReport = function() {
        document.getElementById('bug-page-url').textContent = window.location.href;
        document.getElementById('bug-description').value = '';
        document.getElementById('bug-msg').textContent = '';
        document.getElementById('bug-modal').style.display = 'flex';
        document.getElementById('bug-submit-btn').disabled = false;
    };
    window.closeBugReport = function() {
        document.getElementById('bug-modal').style.display = 'none';
    };
    window.submitBugReport = async function() {
        var d = document.getElementById('bug-description').value.trim();
        if (!d) { document.getElementById('bug-msg').innerHTML = '<span style="color:#ff4444;">Please describe the bug.</span>'; return; }
        var b = document.getElementById('bug-submit-btn');
        b.disabled = true;
        document.getElementById('bug-msg').innerHTML = '<span style="color:#888;">Submitting...</span>';
        try {
            var r = await fetch(SUPABASE_URL + '/rest/v1/bug_reports', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Prefer': 'return=representation' },
                body: JSON.stringify({ page_url: window.location.href, description: d })
            });
            if (r.ok || r.status === 201) {
                document.getElementById('bug-msg').innerHTML = '<span style="color:#44aa44;">Bug reported! Thank you.</span>';
                document.getElementById('bug-description').value = '';
                setTimeout(window.closeBugReport, 2000);
            } else {
                var txt = await r.text();
                document.getElementById('bug-msg').innerHTML = '<span style="color:#ff4444;">Error: ' + (txt || r.statusText) + '</span>';
                b.disabled = false;
            }
        } catch(e) {
            document.getElementById('bug-msg').innerHTML = '<span style="color:#ff4444;">Error: ' + e.message + '</span>';
            b.disabled = false;
        }
    };
</script>
