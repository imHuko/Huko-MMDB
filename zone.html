<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone - MUD Equipment DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1, h2 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 0; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        nav .dropbtn { cursor: pointer; color: #8787FF; }
        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }
        nav .dropdown-content a { display: block; padding: 8px 12px; margin: 0; white-space: nowrap; }
        nav .dropdown-content a:hover { background: #444; color: #C0C0C0; }
        nav .dropdown:hover .dropdown-content { display: block; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th { background: #333; color: #888; padding: 8px; text-align: left; font-size: 13px; border: 1px solid #444; }
        td { padding: 6px 8px; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
        tr:hover td { background: #222; }
        .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
        .stat-box { background: #222; padding: 12px 20px; border-radius: 5px; text-align: center; border: 1px solid #333; min-width: 80px; }
        .stat-box .num { font-size: 24px; font-weight: bold; color: #8787FF; }
        .stat-box .lbl { font-size: 11px; color: #888; margin-top: 3px; }
        .tab-bar { display: flex; gap: 6px; margin: 15px 0; }
        .tab-bar button { background: #333; color: #888; border: 1px solid #444; border-radius: 3px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
        .tab-bar button.active { background: #8787FF; color: #000; border-color: #8787FF; }
        .section { display: none; }
        .section.active { display: block; }
        .search-row { display: flex; gap: 8px; margin: 10px 0; }
        .search-row input { padding: 7px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; width: 220px; }
        .search-row button { padding: 7px 14px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; }
        .load-more { text-align: center; margin: 15px 0; }
        .load-more button { padding: 8px 20px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; }
        .empty { color: #555; padding: 20px 0; }
        .hits { color: #44aa44; font-size: 12px; }
        #sticky-header { position: sticky; top: 0; z-index: 100; background: #1a1a1a; }
    </style>
</head>
<body>
    <div style="margin-bottom:6px;text-align:center;"><a href="index.html" style="text-decoration:none;"><img src="images/logo.png" alt="HukoDB" style="height:130px;cursor:pointer;"></a></div>
    <div id="sticky-header">
    <nav>
        <a href="index.html">Search</a>
        <a href="zones.html">Zones</a>
        <a href="rooms.html">Rooms</a>
        <a href="leaderboard.html">Leaderboard</a>
        
        <div class="dropdown">
            <span class="dropbtn">Games ▼</span>
            <div class="dropdown-content">
                <a href="daily.html">Daily</a>
                <a href="zonequiz.html">Zone Quiz</a>
                <a href="mobguess.html">Mob Guess</a>
            </div>
        </div>

        <div class="dropdown">
            <span class="dropbtn">Community Tools ▼</span>
            <div class="dropdown-content">
                <a href="market.html">Market</a>
                <a href="lfg.html">LFG</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">More ▼</span>
            <div class="dropdown-content">
                <a href="info.html">About</a>
                <a href="ideas.html">Ideas</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">Sites ▼</span>
            <div class="dropdown-content">
                <a href="https://annwn.info" target="_blank" rel="noopener">Annwn</a>
                <a href="https://ooc.dune.net" target="_blank" rel="noopener">OOC</a>
                <a href="https://alyria-online.com" target="_blank" rel="noopener">Alyria-Online</a>
            </div>
        </div>
        <div class="dropdown" id="editor-dropdown" style="display:none;">
            <span class="dropbtn">Editor ▼</span>
            <div class="dropdown-content">
                <a href="import.html">Add Equipment</a>
                <a href="batch.html">Batch Import</a>
            </div>
        </div>
        <span id="login-link"><a href="login.html">Login</a></span>
        <span id="signup-link"><a href="signup.html" style="color:#44aa44;">Sign Up</a></span>
        <span id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></span>
        <span id="admin-link" style="display:none;"><a href="admin.html" style="color:#FFD700;font-weight:bold;">Admin Panel</a></span>
    </nav>
    <script>document.querySelectorAll('nav a').forEach(function(a){if(a.href.split('/').pop()===location.pathname.split('/').pop())a.style.color='#00FFFF';});</script>
    </div>

    <div id="page-content">Loading...</div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var params  = new URLSearchParams(window.location.search);
        var area    = params.get('area');

        if (!area) {
            document.getElementById('page-content').innerHTML = '<p>No zone specified. <a href="zones.html">Browse all zones</a></p>';
        } else {
            document.title = area + ' - MUD Equipment DB';
            loadZone(area);
        }

        var mobOffset  = 0, itemOffset  = 0;
        var mobSearch  = '',  itemSearch  = '';
        var MOB_PAGE   = 50,  ITEM_PAGE   = 50;
        var allMobData = [], allItemData = [];

        async function loadZone(area) {
            var [mobResult, itemResult] = await Promise.all([
                supabase.rpc('get_zone_mobs',  { zone_area: area }),
                supabase.rpc('get_zone_items', { zone_area: area })
            ]);

            allMobData  = mobResult.data  || [];
            allItemData = itemResult.data || [];

            var totalMobs  = allMobData.length;
            var totalItems = allItemData.length;

            var content = document.getElementById('page-content');
            content.innerHTML = '';

            var h1 = document.createElement('h1');
            h1.textContent = area;
            content.appendChild(h1);

            var statRow = document.createElement('div');
            statRow.className = 'stat-row';
            statRow.innerHTML = '<div class="stat-box"><div class="num">' + totalMobs + '</div><div class="lbl">Mobs</div></div>'
                + '<div class="stat-box"><div class="num">' + totalItems + '</div><div class="lbl">Items</div></div>';
            content.appendChild(statRow);

            var tabBar = document.createElement('div');
            tabBar.className = 'tab-bar';
            tabBar.innerHTML = '<button class="active" id="tab-mobs" onclick="switchZoneTab(\'mobs\')">Mobs (' + totalMobs + ')</button>'
                + '<button id="tab-items" onclick="switchZoneTab(\'items\')">Items (' + totalItems + ')</button>';
            content.appendChild(tabBar);

            var mobSection = document.createElement('div');
            mobSection.id = 'section-mobs';
            mobSection.className = 'section active';
            mobSection.innerHTML = '<div class="search-row">'
                + '<input type="text" id="mob-search" placeholder="Filter mobs..." onkeypress="if(event.key===\'Enter\')filterMobs()">'
                + '<button onclick="filterMobs()">Filter</button>'
                + '</div>'
                + '<table><thead><tr><th>Mob</th><th>Room</th><th>Hits</th></tr></thead><tbody id="mob-tbody"></tbody></table>'
                + '<div class="load-more" id="mob-load-more" style="display:none;"><button onclick="loadMoreMobs()">Load More</button></div>';
            content.appendChild(mobSection);

            var itemSection = document.createElement('div');
            itemSection.id = 'section-items';
            itemSection.className = 'section';
            itemSection.innerHTML = '<div class="search-row">'
                + '<input type="text" id="item-search" placeholder="Filter items..." onkeypress="if(event.key===\'Enter\')filterItems()">'
                + '<button onclick="filterItems()">Filter</button>'
                + '</div>'
                + '<table><thead><tr><th>Item</th></tr></thead><tbody id="item-tbody"></tbody></table>'
                + '<div class="load-more" id="item-load-more" style="display:none;"><button onclick="loadMoreItems()">Load More</button></div>';
            content.appendChild(itemSection);

            renderMobs(false);
            renderItems(false);
        }

        window.switchZoneTab = function(tab) {
            document.querySelectorAll('.tab-bar button').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('section-' + tab).classList.add('active');
        };

        window.filterMobs = function() {
            mobSearch = document.getElementById('mob-search').value.trim().toLowerCase();
            mobOffset = 0;
            renderMobs(false);
        };

        window.loadMoreMobs = function() {
            mobOffset += MOB_PAGE;
            renderMobs(true);
        };

        function renderMobs(append) {
            var tbody = document.getElementById('mob-tbody');
            if (!append) { tbody.innerHTML = ''; mobOffset = 0; }

            var filtered = mobSearch
                ? allMobData.filter(function(m) { return m.name.toLowerCase().indexOf(mobSearch) >= 0; })
                : allMobData;

            var page = filtered.slice(mobOffset, mobOffset + MOB_PAGE);

            if (page.length === 0 && !append) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty">No mobs found.</td></tr>';
                document.getElementById('mob-load-more').style.display = 'none';
                return;
            }

            page.forEach(function(mob) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td><a href="mob.html?mobid=' + encodeURIComponent(mob.mobid) + '">' + escHtml(mob.name) + '</a></td>'
                    + '<td style="color:#888;">' + escHtml(mob.top_room || '-') + '</td>'
                    + '<td class="hits">' + (mob.total_hits || '-') + '</td>';
                tbody.appendChild(tr);
            });

            mobOffset += page.length;
            document.getElementById('mob-load-more').style.display = (mobOffset < filtered.length) ? 'block' : 'none';
        }

        window.filterItems = function() {
            itemSearch = document.getElementById('item-search').value.trim().toLowerCase();
            itemOffset = 0;
            renderItems(false);
        };

        window.loadMoreItems = function() {
            itemOffset += ITEM_PAGE;
            renderItems(true);
        };

        function renderItems(append) {
            var tbody = document.getElementById('item-tbody');
            if (!append) { tbody.innerHTML = ''; itemOffset = 0; }

            var filtered = itemSearch
                ? allItemData.filter(function(i) { return i.name.toLowerCase().indexOf(itemSearch) >= 0; })
                : allItemData;

            var page = filtered.slice(itemOffset, itemOffset + ITEM_PAGE);

            if (page.length === 0 && !append) {
                tbody.innerHTML = '<tr><td class="empty">No items found.</td></tr>';
                document.getElementById('item-load-more').style.display = 'none';
                return;
            }

            page.forEach(function(item) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td><a href="item.html?name=' + encodeURIComponent(item.name) + '">' + escHtml(item.name) + '</a></td>';
                tbody.appendChild(tr);
            });

            itemOffset += page.length;
            document.getElementById('item-load-more').style.display = (itemOffset < filtered.length) ? 'block' : 'none';
        }

        function escHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>

    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
        }
                if (localStorage.getItem('user_logged_in') === 'true') {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
        }
        function logout() {
            Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    </script>
</body>
</html>
