<script>
    // ============================================
    // AUTH UI (plain script — runs before module)
    // ============================================
    function isEditor() {
        return sessionStorage.getItem('editor_logged_in') === 'true';
    }
    function hasSession() { return Object.keys(localStorage).some(function(k){return k.startsWith('sb-') && localStorage.getItem(k);}); }
            if (localStorage.getItem('user_logged_in') === 'true' || hasSession()) {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
        }
        function logout() {
            Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    if (isEditor()) {
        document.getElementById('editor-dropdown').style.display = 'inline-block';
        document.getElementById('admin-link').style.display = 'inline';
        document.getElementById('logout-link').style.display = 'inline';
        document.getElementById('login-link').style.display = 'none';
    }
    function toggleHistory() {
        const el = document.getElementById('version-history');
        const btn = document.getElementById('toggle-history-btn');
        if (el) {
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            if (btn) btn.textContent = el.style.display === 'block' ? 'Hide Version History' : 'Show Version History';
        }
    }
</script>

<script type="module">
    // ============================================
    // SUPABASE CONFIG
    // ============================================
    const SUPABASE_URL     = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // URL PARAMS
    // ============================================
    const params   = new URLSearchParams(window.location.search);
    let   itemId   = params.get('id');
    const itemName = params.get('name');

    // ============================================
    // HELPERS
    // ============================================
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function sanitizeHtml(html) {
        if (!html) return '';
        const d = document.createElement('div');
        d.innerHTML = html;
        const kill = d.querySelectorAll('script, iframe, object, embed, form, input, a, link, meta, style');
        for (let i = 0; i < kill.length; i++) kill[i].remove();
        const all = d.querySelectorAll('*');
        for (let i = 0; i < all.length; i++) {
            const attrs = all[i].attributes;
            for (let j = attrs.length - 1; j >= 0; j--) {
                const name = attrs[j].name;
                if (name.startsWith('on') || name === 'href' || name === 'src') {
                    all[i].removeAttribute(name);
                }
            }
        }
        return d.innerHTML;
    }

    function hitBadge(hits) {
        const n = hits ? parseInt(hits) : 1;
        if (n >= 5) return '<span style="color:#44aa44;font-weight:bold;">' + n + '</span>';
        if (n >= 2) return '<span style="color:#ffaa00;">'                  + n + '</span>';
        return             '<span style="color:#ff4444;">'                  + n + '</span>';
    }

    // ============================================
    // LOAD ITEM
    // ============================================
    async function loadItem() {
        let item = null;

        if (itemId) {
            const { data } = await supabase.from('equipment').select('*').eq('id', itemId).single();
            item = data;
        } else if (itemName) {
            const { data } = await supabase.from('equipment').select('*').eq('name', itemName).order('created_at', { ascending: false });
            if (data && data.length === 1) {
                item = data[0];
            } else if (data && data.length > 1) {
                // Multiple versions — show picker and stop
                let html = '<h1>' + escapeHtml(itemName) + '</h1>';
                html += '<p style="color:#ffaa00;">Multiple versions found:</p>';
                data.forEach((dup, d) => {
                    const sourceLabel = (dup.properties && dup.properties.source) ? escapeHtml(dup.properties.source) : 'unknown';
                    const dateStr     = new Date(dup.created_at).toLocaleDateString();
                    html += '<div style="background:#222;padding:10px;margin:5px 0;border-radius:5px;">';
                    html += '<a href="item.html?id=' + dup.id + '" style="font-size:16px;">Version #' + (d + 1) + '</a>';
                    html += '<br><span style="color:#888;">Added: ' + dateStr + ' | Via: ' + sourceLabel + '</span>';
                    html += '</div>';
                });
                document.getElementById('item-details').innerHTML = html;
                return false;
            }
        }

        // Fallback: look up stub in items_db (only when we have a name)
        if (!item && itemName) {
            const { data } = await supabase.from('items_db').select('*').ilike('name', itemName).limit(1);
            if (data && data.length > 0) {
                item = { name: data[0].name, type: 'unknown', verified: false, description: '', _dbItem: data[0] };
            }
        }

        if (!item) {
            document.getElementById('item-details').innerHTML = '<p>Item not found. <a href="index.html">Search here</a>.</p>';
            return false;
        }

        itemId = item.id;

        // --- Header ---
        let html = '<h1>' + escapeHtml(item.name) + '</h1>';
        html += '<div class="meta">';
        html += '<strong>Type:</strong> ' + escapeHtml(item.type || 'unknown');
        if (item.slot)          html += ' | <strong>Slot:</strong> '   + escapeHtml(item.slot);
        if (item.level_req > 0) html += ' | <strong>Level:</strong> '  + item.level_req;
        if (item.weight > 0)    html += ' | <strong>Weight:</strong> ' + item.weight;
        if (item.value > 0)     html += ' | <strong>Value:</strong> '  + item.value + ' gold';
        html += ' | ' + (item.verified
            ? '<span style="color:#44aa44;">EQDB</span>'
            : '<span style="color:#ffaa00;">Personal</span>');
        html += '</div>';

        if (item.mud_zone)   html += '<p><strong>Zone:</strong> '       + escapeHtml(item.mud_zone)   + '</p>';
        if (item.mob_source) html += '<p><strong>Dropped by:</strong> ' + escapeHtml(item.mob_source) + '</p>';
        if (item.properties && item.properties.uploaded_by) {
            html += '<p style="font-size:13px;color:#888;"><strong>Submitted by:</strong> ' + escapeHtml(item.properties.uploaded_by) + '</p>';
        }

        // --- Stats block ---
        if (item.description) {
            const alreadyColored = item.description.includes('<font color=') || item.description.includes('<span class=');
            html += '<div class="mm-output">' + (alreadyColored ? sanitizeHtml(item.description) : colorizeMM(item.description)) + '</div>';
        } else if (!item.verified && (item.type === 'unknown' || !item.type)) {
            html += '<p style="color:#ffaa00;margin-top:10px;">Stats not yet available — awaiting capture from the MUD.</p>';
        }

        // --- Submitter credit and locations in parallel ---
        const [creditHtml, locationsHtml] = await Promise.all([
            buildSubmitterCredit(item.name),
            buildLocationsHtml(item.name)
        ]);
        html += creditHtml;
        html += locationsHtml;

        document.getElementById('item-details').innerHTML = html;
        document.getElementById('breadcrumb-item').textContent = escapeHtml(item.name);

        // Show editor controls only after item is rendered (and pass name to avoid closure issues)
        if (isEditor()) {
            document.getElementById('add-location-section').style.display = 'block';
            setupLocationSubmit(item.name);
        }

        return true;
    }

    // ============================================
    // LOCATIONS
    // ============================================
    async function buildLocationsHtml(name) {
        const { data: dbItems } = await supabase
            .from('items_db')
            .select('id, name, itemid')
            .ilike('name', '%' + name.replace(/'/g, "''") + '%')
            .limit(10);

        if (!dbItems || dbItems.length === 0) return '';

        // Fetch all location rows in parallel
        const locArrays = await Promise.all(
            dbItems.map(dbItem =>
                supabase.from('itemsloc_db')
                    .select('area, room, mobid, hits')
                    .eq('itemid', String(dbItem.itemid))
                    .order('hits', { ascending: false, nullsLast: true })
                    .limit(100)
                    .then(r => r.data || [])
            )
        );

        // Deduplicate by area+room+mobid
        const seen = new Set();
        const uniqueLocations = locArrays.flat().filter(loc => {
            const key = (loc.area || '') + '|' + (loc.room || '') + '|' + (loc.mobid || '0');
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });

        uniqueLocations.sort((a, b) => (b.hits || 0) - (a.hits || 0));
        if (uniqueLocations.length === 0) return '';

        // Batch-resolve mob names, mob room numbers, and named room numbers in parallel
        const allMobIds = [...new Set(uniqueLocations.map(l => l.mobid).filter(Boolean).map(String))];
        const mobNameMap = {};
        const mobRoomMap = {};
        const roomNameToNum = {};

        const queries = [];
        if (allMobIds.length > 0) {
            queries.push(
                supabase.from('mobs_db').select('mobid, name').in('mobid', allMobIds),
                supabase.from('mobsloc_db').select('mobid, room').in('mobid', allMobIds).limit(500)
            );
        }

        // Look up room names in rooms_db to get room numbers
        const namedRooms = uniqueLocations.filter(l => l.room && l.room !== '-' && l.area);
        if (namedRooms.length > 0) {
            const roomNames = [...new Set(namedRooms.map(l => l.room))];
            const roomAreas = [...new Set(namedRooms.map(l => l.area))];
            queries.push(
                supabase.from('rooms_db')
                    .select('uid, name, area')
                    .in('name', roomNames)
                    .in('area', roomAreas)
                    .limit(500)
            );
        }

        if (queries.length > 0) {
            const results = await Promise.all(queries);
            let idx = 0;
            if (allMobIds.length > 0) {
                const mobRows = results[idx++];
                const mobLocRows = results[idx++];
                if (mobRows.data) mobRows.data.forEach(m => { mobNameMap[String(m.mobid)] = m.name; });
                if (mobLocRows.data) mobLocRows.data.forEach(m => {
                    const id = String(m.mobid);
                    const r = m.room && m.room !== '-' ? String(m.room) : '';
                    if (r && !mobRoomMap[id]) mobRoomMap[id] = r;
                });
            }
            if (namedRooms.length > 0) {
                const roomRows = results[idx];
                if (roomRows.data) roomRows.data.forEach(r => {
                    const key = (r.area || '') + '|' + (r.name || '');
                    if (!roomNameToNum[key]) roomNameToNum[key] = String(r.uid);
                });
            }
        }

        // Build resolved list — room name from itemsloc_db, room # from rooms_db or mobsloc_db
        const resolved = uniqueLocations.map(loc => {
            const roomName = (loc.room && loc.room !== '-') ? String(loc.room) : '';
            const mobId    = loc.mobid ? String(loc.mobid) : '';
            const mobName  = mobId ? (mobNameMap[mobId] || '') : '';
            const roomNum  = mobId ? (mobRoomMap[mobId] || '') : (roomNameToNum[(loc.area || '') + '|' + roomName] || '');
            return { loc, roomNum, roomName, mobName };
        });

        let html = '<h2 style="color:#C0C0C0;margin-top:20px;">Known Locations (' + uniqueLocations.length + ')</h2>';
        html += '<p style="font-size:12px;color:#888;">🟢 5+ hits = confirmed | 🟡 2-4 hits = likely | 🔴 1 hit = possible player drop</p>';
        html += '<table style="width:100%;border-collapse:collapse;">'
            + '<tr>'
            + '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Zone</th>'
            + '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Room #</th>'
            + '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Room Name</th>'
            + '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Mob</th>'
            + '<th style="color:#888;text-align:left;padding:5px;border-bottom:1px solid #444;">Hits</th>'
            + '</tr>';

        for (const { loc, roomNum, roomName, mobName } of resolved) {
            const mobCell = loc.mobid
                ? '<a href="mob.html?mobid=' + escapeHtml(String(loc.mobid)) + '">' + escapeHtml(mobName) + '</a>'
                : '-';
            html += '<tr>'
                + '<td style="padding:5px;border-bottom:1px solid #333;">' + escapeHtml(loc.area || '') + '</td>'
                + '<td style="padding:5px;border-bottom:1px solid #333;">' + (roomNum  || '-') + '</td>'
                + '<td style="padding:5px;border-bottom:1px solid #333;">' + (roomName || '-') + '</td>'
                + '<td style="padding:5px;border-bottom:1px solid #333;">' + mobCell           + '</td>'
                + '<td style="padding:5px;border-bottom:1px solid #333;">' + hitBadge(loc.hits) + '</td>'
                + '</tr>';
        }
        html += '</table>';
        return html;
    }

    // ============================================
    // SUBMITTER CREDIT + VERSION HISTORY
    // ============================================
    async function buildSubmitterCredit(itemName) {
        const { data: history } = await supabase
            .from('submission_history')
            .select('*')
            .eq('item_name', itemName)
            .order('created_at', { ascending: true });

        if (!history || history.length === 0) return '';

        let html = '<div style="background:#1a2a1a;border:1px solid #3a5a3a;padding:12px;border-radius:5px;margin:15px 0;">';

        // Earliest submission = original credit
        const original = history[0];
        const originalDate = new Date(original.created_at).toLocaleDateString();
        const sourceLabel = original.is_eqdb ? '<span style="color:#44aa44;">EQDB</span>' : '<span style="color:#ffaa00;">Personal</span>';
        html += '<p style="margin:0 0 4px 0;font-size:13px;">'
             + '<span style="color:#888;">Originally submitted by</span> '
             + '<strong style="color:#C0C0C0;">' + escapeHtml(original.submitter) + '</strong>'
             + ' <span style="color:#888;">on</span> ' + originalDate
             + ' (' + sourceLabel + ')'
             + '</p>';

        // Latest submission = last EQDB if any, or last overall
        const latest = history[history.length - 1];
        if (latest.id !== original.id) {
            const latestDate = new Date(latest.created_at).toLocaleDateString();
            const latestLabel = latest.is_eqdb ? '<span style="color:#44aa44;">EQDB</span>' : '<span style="color:#ffaa00;">Personal</span>';
            const overwrittenCount = history.filter(h => h.overwritten_at).length;
            html += '<p style="margin:0;font-size:13px;">'
                 + '<span style="color:#888;">Last updated by</span> '
                 + '<strong style="color:#C0C0C0;">' + escapeHtml(latest.submitter) + '</strong>'
                 + ' <span style="color:#888;">on</span> ' + latestDate
                 + ' (' + latestLabel + ')'
                 + '</p>';
        }

        // Version count
        if (history.length > 1) {
            html += '<p style="margin:4px 0 0 0;font-size:12px;color:#666;">'
                 + history.length + ' version' + (history.length > 1 ? 's' : '') + ' saved'
                 + '</p>';
        }

        // Toggle version history button
        html += '<button id="toggle-history-btn" style="background:#333;color:#ccc;border:1px solid #555;padding:4px 10px;font-size:12px;margin-top:8px;cursor:pointer;" onclick="toggleHistory()">Show Version History</button>';
        html += '<div id="version-history" style="display:none;margin-top:8px;font-size:12px;max-height:300px;overflow-y:auto;">';

        // Table of all versions
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px;">'
             + '<tr style="color:#888;"><th style="text-align:left;padding:4px;border-bottom:1px solid #444;">#</th>'
             + '<th style="text-align:left;padding:4px;border-bottom:1px solid #444;">Date</th>'
             + '<th style="text-align:left;padding:4px;border-bottom:1px solid #444;">Submitter</th>'
             + '<th style="text-align:left;padding:4px;border-bottom:1px solid #444;">Source</th>'
             + '<th style="text-align:left;padding:4px;border-bottom:1px solid #444;">Status</th></tr>';

        for (let v = 0; v < history.length; v++) {
            const h = history[v];
            const vDate = new Date(h.created_at).toLocaleDateString();
            const vSource = h.is_eqdb ? '<span style="color:#44aa44;">EQDB</span>' : '<span style="color:#ffaa00;">Personal</span>';
            const vStatus = h.overwritten_at
                ? '<span style="color:#888;">Overwritten</span>'
                : '<span style="color:#44aa44;">Active</span>';
            html += '<tr>'
                 + '<td style="padding:4px;border-bottom:1px solid #333;">' + (v + 1) + '</td>'
                 + '<td style="padding:4px;border-bottom:1px solid #333;">' + vDate + '</td>'
                 + '<td style="padding:4px;border-bottom:1px solid #333;">' + escapeHtml(h.submitter) + '</td>'
                 + '<td style="padding:4px;border-bottom:1px solid #333;">' + vSource + '</td>'
                 + '<td style="padding:4px;border-bottom:1px solid #333;">' + vStatus + '</td>'
                 + '</tr>';
        }
        html += '</table></div></div>';
        return html;
    }

    // ============================================
    // ADD LOCATION (editors only)
    // ============================================
    function setupLocationSubmit(currentItemName) {
        document.getElementById('submit-location-btn').addEventListener('click', async function () {
            const zone = document.getElementById('new-zone').value.trim();
            const room = document.getElementById('new-room').value.trim();
            const mob  = document.getElementById('new-mob').value.trim();
            const msg  = document.getElementById('location-message');

            if (!zone) { msg.innerHTML = '<span style="color:#ff4444;">Zone is required.</span>'; return; }

            const { data: found } = await supabase.from('items_db').select('itemid').ilike('name', currentItemName).limit(1);
            if (!found || found.length === 0) {
                msg.innerHTML = '<span style="color:#ff4444;">Item not found in location database.</span>';
                return;
            }

            const locItemId = found[0].itemid; // distinct name — does NOT shadow outer itemId
            const { error } = await supabase.from('itemsloc_db').insert({
                itemid:     String(locItemId),
                area:       zone,
                room:       room || null,
                mobid:      mob  || null,
                hits:       1,
                date_added: new Date().toISOString()
            });

            if (error) {
                msg.innerHTML = '<span style="color:#ff4444;">Error: ' + error.message + '</span>';
            } else {
                msg.innerHTML = '<span style="color:#44aa44;">Location added! Refresh to see it.</span>';
                document.getElementById('new-zone').value = '';
                document.getElementById('new-room').value = '';
                document.getElementById('new-mob').value  = '';
            }
        });
    }

    // ============================================
    // COMMENTS
    // ============================================
    async function loadComments() {
        if (!itemId) return;
        const section = document.getElementById('comments-section');
        const { data: comments, error } = await supabase
            .from('comments').select('*')
            .eq('equipment_id', itemId)
            .order('created_at', { ascending: false });

        if (error)                              { section.innerHTML = '<p>Error: ' + error.message + '</p>'; return; }
        if (!comments || comments.length === 0) { section.innerHTML = '<p>No comments yet. Be the first!</p>'; return; }

        section.innerHTML = comments.map(c =>
            '<div class="comment">'
            + '<div class="comment-header"><strong>' + escapeHtml(c.display_name) + '</strong> — ' + new Date(c.created_at).toLocaleString() + '</div>'
            + '<p>' + escapeHtml(c.comment_text) + '</p>'
            + '</div>'
        ).join('');
    }

    document.getElementById('submit-comment').addEventListener('click', async function () {
        const name = document.getElementById('display-name').value.trim();
        const text = document.getElementById('comment-text').value.trim();
        const msg  = document.getElementById('comment-message');
        if (!name) { msg.textContent = 'Please enter a name.';    return; }
        if (!text) { msg.textContent = 'Please enter a comment.'; return; }
        const { error } = await supabase.from('comments').insert({ equipment_id: itemId, display_name: name, comment_text: text });
        if (error) {
            msg.textContent = 'Error: ' + error.message;
        } else {
            document.getElementById('display-name').value = '';
            document.getElementById('comment-text').value = '';
            msg.textContent = 'Comment posted!';
            loadComments();
        }
    });

    // ============================================
    // MM COLORIZER ENGINE
    // ============================================
    const C = {
        blue: '#8787FF', white: '#C0C0C0', cyan: '#00FFFF', yellow: '#FFFF00',
        green: '#00FF00', pink: '#D78787', magenta: '#FF00FF', gray: '#808080',
        olive: '#808000', red: '#FF0000', darkgreen: '#008000'
    };

    function tag(color, text) {
        return '<font color="' + color + '">' + text + '</font>';
    }

    // Wrap digit runs in white within an already-opened font block
    function numbersWhite(str, baseColor) {
        return str.replace(/(\d[\d,]*\.?\d*%?)/g,
            '</font><font color="' + C.white + '">$1</font><font color="' + baseColor + '">');
    }

    // Clickable item link styled to blend with terminal palette
    function itemLink(name) {
        return '<a href="item.html?name=' + encodeURIComponent(name)
            + '" style="color:' + C.white + ';text-decoration:none;"'
            + ' onmouseover="this.style.textDecoration=\'underline\'"'
            + ' onmouseout="this.style.textDecoration=\'none\'">'
            + escapeHtml(name) + '</a>';
    }

    function colorizeItemLine(line) {
        let h = tag(C.blue, "Item '");
        const nm = line.match(/^Item\s+'(.+?)'\s+is type/);        if (nm) h += tag(C.white, escapeHtml(nm[1])) + tag(C.blue, "' is type ");
        const tm = line.match(/is type\s+(\S+)/);                  if (tm) h += tag(C.white, escapeHtml(tm[1].replace(',', ''))) + tag(C.blue, ',');
        const am = line.match(/alignment\s+(-?\d+)/);              if (am) h += tag(C.blue, ' alignment ') + tag(C.white, am[1]) + tag(C.blue, ',');
        const mm = line.match(/made of\s+(\S+)/);                  if (mm) h += tag(C.blue, ' made of ') + tag(C.white, escapeHtml(mm[1]));
        const cm = line.match(/\(in\s+\((.+?)\)\s+condition\)/);   if (cm) h += tag(C.blue, ' (in ') + tag(C.white, '(' + escapeHtml(cm[1]) + ')') + tag(C.blue, ' condition)');
        if (/\[EQDB\]/.test(line))  h += tag(C.white, '[EQDB]');
        if (/\[Study\]/.test(line)) h += tag(C.white, '[Study]');
        if (/\[LTB\]/.test(line))   h += tag(C.white, '[LTB]');
        return h;
    }

    function colorizeKeywordLine(line) {
        let h = tag(C.blue, "has keywords '");
        const km = line.match(/has keywords\s+'([^']+)'/); if (km) h += tag(C.white, escapeHtml(km[1])) + tag(C.blue, "'");
        const em = line.match(/, equipped\s+(.+?)\.?$/);   if (em) h += tag(C.blue, ', equipped ') + tag(C.white, escapeHtml(em[1])) + tag(C.blue, '.');
        return h;
    }

    function colorizeAffectLine(line) {
        const isSetBonus  = /\(Requires\s+\d+\s+items?\)/.test(line);
        const labelColor  = isSetBonus ? C.magenta : C.cyan;
        const match = line.match(/^Affects\s+(.+?)\s+by\s+(-?[\d.]+)\s*(\.?)\s*(\(Requires\s+\d+\s+items?\))?\.?\s*(\{[^}]+\})?/);
        if (match) {
            const [, stat, num, dot, req, freq] = match;
            let h = tag(labelColor, 'Affects') + ' ' + tag(C.white, stat) + ' ' + tag(labelColor, 'by') + ' ' + tag(C.white, num);
            if (dot) h += tag(labelColor, dot);
            if (req) {
                const rm = req.match(/\(Requires\s+(\d+)\s+items?\)/);
                h += rm
                    ? ' ' + tag(C.magenta, '(Requires ') + tag(C.white, rm[1]) + tag(C.magenta, ' items)')
                    : ' ' + tag(C.magenta, req);
            }
            if (freq) h += ' ' + tag(C.pink, freq);
            return h;
        }
        return tag(labelColor, escapeHtml(line));
    }

    function colorizeReqLine(content) {
        let h = escapeHtml(content);
        h = h.replace(/Your /,             'Your </font><font color="' + C.white + '">');
        h = h.replace(/ must be /,         '</font><font color="' + C.cyan + '"> must be </font><font color="' + C.white + '">');
        h = h.replace(/ must not be /,     '</font><font color="' + C.cyan + '"> must not be </font><font color="' + C.white + '">');
        h = h.replace(/ to use this item/, '</font><font color="' + C.cyan + '"> to use this item');
        return h;
    }

    function colorizeMM(text) {
        if (!text) return '';
        text = text.replace(/\n?.*\d+hp\s+\d+sp\s+\d+st[^\n]*\n?/g, '\n');
        const lines  = text.split('\n');
        const result = [];
        let inRelic  = false;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const t    = line.trim();
            if (t === '') { result.push(''); continue; }

            // +++ procs = green multi-line block
            if (/^\+\+\+/.test(t)) {
                result.push(tag(C.green, escapeHtml(line)));
                i++;
                while (i < lines.length) {
                    const nl = lines[i], nt = nl.trim();
                    if (nt === '' || /^\+\+\+/.test(nt) || /^Item\s+'/.test(nt) || /^\*/.test(nt)) { i--; break; }
                    result.push(tag(C.green, escapeHtml(nl)));
                    i++;
                }
                continue;
            }

            // Relic section = green
            if (/^Relics:/.test(t))                           { inRelic = true;  result.push(tag(C.green, escapeHtml(line))); continue; }
            if (inRelic && /^(Small|Medium|Large)\s*\(/.test(t))               { result.push(tag(C.green, escapeHtml(line))); continue; }
            if (inRelic && /^\s*\(\d+\/\d+/.test(t))          { inRelic = false; result.push(tag(C.green, escapeHtml(line))); continue; }

            // * requirement lines
            if (/^\*/.test(t)) {
                if (/^\*\s*Item\s+'/.test(t)) {
                    // Set bonus item reference — clickable
                    const si = t.match(/\*\s*(Item\s+')(.+)(')$/);
                    result.push(si
                        ? tag(C.yellow, '* ') + tag(C.magenta, si[1]) + itemLink(si[2]) + tag(C.magenta, si[3])
                        : tag(C.yellow, escapeHtml(line)));
                    continue;
                }
                if (/^\*This/.test(t)) {
                    // *This … = blue with white numbers
                    result.push(tag(C.yellow, '*') + tag(C.blue, ' ' + numbersWhite(escapeHtml(t.substring(1).trim()), C.blue) + '</font>'));
                    continue;
                }
                // Default requirement = yellow star + cyan text
                result.push(tag(C.yellow, '*') + tag(C.cyan, colorizeReqLine(t.substring(1).trim())));
                continue;
            }

            // - Item 'name' = set member list — clickable
            if (/^-\s*Item\s+'/.test(t)) {
                const di = t.match(/^(-\s*)(Item\s+')(.+)(')$/);
                if (di) result.push(tag(C.gray, di[1]) + tag(C.magenta, di[2]) + itemLink(di[3]) + tag(C.magenta, di[4]));
                continue;
            }

            // Affects line
            if (/^Affects/.test(t)) { result.push(colorizeAffectLine(t)); continue; }

            // Special weapon attributes
            if (/^Special weapon attributes:/.test(t)) {
                const sw = line.match(/^(Special weapon attributes:)\s+(.+)$/);
                result.push(sw
                    ? tag(C.blue, escapeHtml(sw[1])) + ' ' + tag(C.white, escapeHtml(sw[2]))
                    : tag(C.blue, escapeHtml(line)));
                continue;
            }

            // Weapon base stats sentence
            if (/^Your .+ will deal .+ damage with .+ accuracy, at .+ range, with a .+ chance to crit for .+ damage\.$/i.test(t)) {
                const ws = line.match(/^(Your )(.+?)( will deal )(.+?)( damage with )(.+?)( accuracy, at )(.+?)( range, with a )(.+?)( chance to crit for )(.+?)( damage\.)$/i);
                if (ws) {
                    result.push(
                        tag(C.cyan,  escapeHtml(ws[1]))  + tag(C.white, escapeHtml(ws[2]))  +
                        tag(C.cyan,  escapeHtml(ws[3]))  + tag(C.white, escapeHtml(ws[4]))  +
                        tag(C.cyan,  escapeHtml(ws[5]))  + tag(C.white, escapeHtml(ws[6]))  +
                        tag(C.cyan,  escapeHtml(ws[7]))  + tag(C.white, escapeHtml(ws[8]))  +
                        tag(C.cyan,  escapeHtml(ws[9]))  + tag(C.white, escapeHtml(ws[10])) +
                        tag(C.cyan,  escapeHtml(ws[11])) + tag(C.white, escapeHtml(ws[12])) +
                        tag(C.cyan,  escapeHtml(ws[13]))
                    );
                } else {
                    result.push(tag(C.cyan, escapeHtml(line)));
                }
                continue;
            }

            // "When" proc lines = green with white skill name and numbers
            if (/^When/.test(t)) {
                const wm = line.match(/^(When\s+(casting|wielding|evoking|affected\s+by)\s+)(.+?)(,.+)$/i);
                if (wm) {
                    const restColored = numbersWhite(escapeHtml(wm[4]), C.green);
                    let h = tag(C.green, escapeHtml(wm[1])) + tag(C.white, escapeHtml(wm[3])) + '<font color="' + C.green + '">' + restColored + '</font>';
                    h = h.replace(/<font color="#00FF00"><\/font>/g, '');
                    result.push(h);
                } else {
                    result.push('<font color="' + C.green + '">' + numbersWhite(escapeHtml(line), C.green) + '</font>');
                }
                continue;
            }

            // Special stat lines (cyan, magenta for set bonus)
            if (/^(Adds resistance|Decreases|Grants|Casts|Improves|Your weapon special|Alters)/.test(t)) {
                const cls = (/^Adds resistance/.test(t) && /\(Requires/.test(t)) ? C.magenta : C.cyan;
                result.push(tag(cls, numbersWhite(escapeHtml(line), cls) + '</font>'));
                continue;
            }

            // "Increases … to … -based attacks."
            if (/^Increases/.test(t)) {
                const inc = line.match(/^(Increases )(.+?)( to )(.+?)(-based attacks\.)/i);
                if (inc) {
                    result.push(
                        tag(C.cyan, escapeHtml(inc[1])) + tag(C.white, escapeHtml(inc[2])) +
                        tag(C.cyan, escapeHtml(inc[3])) + tag(C.white, escapeHtml(inc[4])) +
                        tag(C.cyan, escapeHtml(inc[5]))
                    );
                } else {
                    result.push(tag(C.cyan, escapeHtml(line)));
                }
                continue;
            }

            // Item name (first identify line)
            if (/^Item\s+'/.test(t)) { result.push(colorizeItemLine(t)); continue; }

            // Level XX item 'name' is type ...
            if (/^Level\s+\d+\s+item\s+'/.test(t)) {
                const lm = t.match(/^(Level\s+\d+\s+item\s+')(.+?)('\s+is type)/);
                result.push(lm
                    ? tag(C.blue, lm[1]) + tag(C.white, escapeHtml(lm[2])) + tag(C.blue, lm[3])
                    : tag(C.blue, escapeHtml(line)));
                continue;
            }

            // Keywords
            if (/^has keywords/.test(t)) { result.push(colorizeKeywordLine(t)); continue; }

            // Lifespan / expiry lines
            if (/^This item has a default lifespan/.test(t) || /^This item will lose its status/.test(t) || /^This item will vanish/.test(t)) {
                result.push(tag(C.blue, numbersWhite(escapeHtml(line), C.blue) + '</font>'));
                continue;
            }

            // "This level X item has the attributes:" — split label from attribute list
            if (/^This level .+ item has the attributes:/.test(t)) {
                const am = line.match(/^(This level \d+ item has the attributes:)(.+)$/);
                result.push(am
                    ? tag(C.blue, numbersWhite(escapeHtml(am[1]), C.blue) + '</font>') + tag(C.white, escapeHtml(am[2]))
                    : tag(C.blue, escapeHtml(line)));
                continue;
            }

            // General stat lines (weight, level, armor, etc.) with optional {Cat. X} in red
            if (/^(This item weighs|This level|This item has|This armor has|This item protects|This ward has|This relic|This item, when|This amulet|Your magical wand|This light source|Armor resistance|This item will have|This item is enchanted)/.test(t)) {
                const catMatch = line.match(/\{Cat\.\s*\d+\}/);
                const catText  = catMatch ? catMatch[0] : '';
                let working    = escapeHtml(line.replace(/\{Cat\.\s*\d+\}/g, '##CAT##'));
                let colored    = tag(C.blue, numbersWhite(working, C.blue) + '</font>');
                if (catText) colored = colored.replace(/##CAT##/g, '</font><font color="' + C.red + '">' + escapeHtml(catText) + '</font><font color="' + C.blue + '">');
                colored = colored.replace(/<font color="#8787FF"><\/font>/g, '');
                result.push(colored);
                continue;
            }

            // Set membership / "You are currently wearing X pieces"
            if (/^(This is part of|You are currently)/.test(t)) {
                result.push(tag(C.magenta, numbersWhite(escapeHtml(line), C.magenta) + '</font>'));
                continue;
            }

            // Beyond power
            if (/This item is beyond your power/.test(t)) { result.push(tag(C.magenta, escapeHtml(line))); continue; }

            // Container / capacity lines
            if (/^(Capacity:|Upon|Small )/.test(t)) {
                result.push(tag(C.cyan, numbersWhite(escapeHtml(line), C.cyan) + '</font>'));
                continue;
            }

            // Default: plain white
            result.push(tag(C.white, escapeHtml(line)));
        }

        return result.join('\n');
    }

    // ============================================
    // INIT
    // ============================================
    if (itemId || itemName) {
        loadItem().then(ok => { if (ok) loadComments(); });
    } else {
        document.getElementById('item-details').innerHTML = '<p>No item specified. <a href="index.html">Search here</a>.</p>';
    }

</script>
