    <style>
        body { font-family: "Inter", sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }

        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }

        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }

        .paste-box { background: #111; border: 1px solid #333; border-radius: 5px; padding: 20px; margin: 15px 0; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; font-family: "Courier New", monospace; font-size: 13px; line-height: 1.4; min-height: 100px; }
        .meta { color: #888; font-size: 13px; margin-bottom: 10px; }
        .error { color: #ff4444; text-align: center; padding: 40px; }

        .copy-btn { padding: 8px 16px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }

    </style>
</head>

    </div>

    <h2>Paste</h2>
    <hr>
    <div id="paste-area"><p class="loading">Loading paste...</p></div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var params = new URLSearchParams(location.search);
        var pasteId = params.get('id');

        if (!pasteId) {
            document.getElementById('paste-area').innerHTML = '<p class="error">No paste ID specified.</p>';
        } else {
            var res = await supabase.from('pastes').select('content, created_at').eq('id', pasteId).limit(1);
            if (res.data && res.data.length > 0) {
                var p = res.data[0];
                var area = document.getElementById('paste-area');
                area.innerHTML = '<div class="meta">Created: ' + new Date(p.created_at).toLocaleString() + ' &mdash; <a href="' + location.href + '">Permalink</a></div>'
                    + '<div class="paste-box">' + p.content + '</div>'
                    + '<button class="copy-btn" onclick="navigator.clipboard.writeText(document.querySelector(\'.paste-box\').innerText)">Copy to Clipboard</button>';
            } else if (res.error) {
                document.getElementById('paste-area').innerHTML = '<p class="error">Error: ' + escHtml(res.error.message) + '</p>';
            } else {
                document.getElementById('paste-area').innerHTML = '<p class="error">Paste not found.</p>';
            }
        }

        function escHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>

    <script>
        function hasSession() { return Object.keys(localStorage).some(function(k){return k.startsWith('sb-') && localStorage.getItem(k);}); }
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
        }
        if (localStorage.getItem('user_logged_in') === 'true' || hasSession()) {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('admin-link').style.display = 'inline';
        }
        function logout() {
            Object.keys(localStorage).filter(function(k){return k.startsWith('sb-');}).forEach(function(k){localStorage.removeItem(k);});
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    </script>
</body>
</html>
