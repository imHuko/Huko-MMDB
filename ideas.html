<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Ideas - MUD Equipment DB</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; }
        nav a { margin-right: 15px; }
        textarea { width: 100%; height: 150px; padding: 10px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; font-family: Arial, sans-serif; box-sizing: border-box; }
        input { padding: 8px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; width: 250px; }
        button { padding: 8px 16px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; margin-top: 10px; }
        .success { color: #44aa44; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Search</a>
        <a href="info.html">About</a>
        <a href="ideas.html">Ideas</a>
        <span id="editor-links" style="display:none;">
            <a href="admin.html">Admin</a>
        </span>
    </nav>
    <hr>

    <h1>Submit Ideas</h1>
    <p>Have a feature request, bug report, or suggestion? Submit it here!</p>
    
    <input type="text" id="submitter-name" placeholder="Your name (optional)" maxlength="50"><br>
    <textarea id="idea-text" placeholder="Describe your idea..."></textarea><br>
    <button id="submit-btn">Submit Idea</button>
    <p id="message"></p>
    <p><a href="index.html">← Back to search</a></p>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('submit-btn').addEventListener('click', async function() {
            var text = document.getElementById('idea-text').value.trim();
            var name = document.getElementById('submitter-name').value.trim() || 'anonymous';
            
            if (!text) { document.getElementById('message').textContent = 'Please enter your idea.'; return; }
            
            var result = await supabase.from('ideas').insert({ idea_text: text, submitted_by: name });
            if (result.error) {
                document.getElementById('message').innerHTML = '<span style="color:#ff4444;">Error: ' + result.error.message + '</span>';
            } else {
                document.getElementById('idea-text').value = '';
                document.getElementById('message').innerHTML = '<span class="success">Idea submitted! Thank you.</span>';
            }
        });
    </script>

</body>
</html>
