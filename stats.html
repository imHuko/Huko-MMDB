<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Stats - MUD Equipment DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 0; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        nav .dropbtn { cursor: pointer; color: #8787FF; }
        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }
        nav .dropdown-content a { display: block; padding: 8px 12px; margin: 0; white-space: nowrap; }
        nav .dropdown-content a:hover { background: #444; color: #C0C0C0; }
        nav .dropdown:hover .dropdown-content { display: block; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin: 20px 0; }
        .stat-card { background: #222; border: 1px solid #333; border-radius: 6px; padding: 16px; text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #8787FF; }
        .stat-card .lbl { font-size: 12px; color: #888; margin-top: 4px; }
        .stat-card .sub { font-size: 11px; color: #555; margin-top: 2px; }
        .section { margin: 24px 0; }
        .section h2 { color: #C0C0C0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px; border-bottom: 1px solid #333; }
        td { padding: 6px 8px; border-bottom: 1px solid #2a2a2a; }
        tr:hover td { background: #222; }
        .num-col { text-align: right; color: #8787FF; font-weight: bold; }
        .mini-bar { display: inline-block; height: 12px; border-radius: 2px; background: #8787FF; vertical-align: middle; margin-right: 6px; }
        .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
        .tag-legit { background: #1a3a1a; color: #44aa44; border: 1px solid #44aa44; }
        .tag-junk { background: #3a1a1a; color: #ff4444; border: 1px solid #ff4444; }
        .tag-skip { background: #2a2a2a; color: #888; border: 1px solid #555; }
        .tag-delete { background: #3a2a1a; color: #ff8800; border: 1px solid #ff8800; }
        .loading { text-align: center; padding: 40px; color: #555; }
        .error { text-align: center; padding: 20px; color: #ff4444; }
        .orphan-warn { color: #ff8800; font-size: 11px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="cleanup.html">Cleanup</a>
        <a href="zone.html">Zone Lookup</a>
        <div class="dropdown">
            <span class="dropbtn">Tools &#9660;</span>
            <div class="dropdown-content">
                <a href="train.html">Colorizer</a>
                <a href="batch.html">Batch Colorizer</a>
                <a href="import.html">Import</a>
                <a href="import-locations.html">Import Locations</a>
                <a href="stats.html">DB Stats</a>
            </div>
        </div>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="account.html" style="margin-left:auto;">Account</a>
    </nav>

    <h1>Database Statistics</h1>
    <div id="stat-grid" class="stat-grid"><div class="loading">Loading...</div></div>

    <div id="sections"></div>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchCount(table) {
            var r = await supabase.from(table).select('*', { count: 'exact', head: true });
            return r.count || 0;
        }

        async function loadStats() {
            var grid = document.getElementById('stat-grid');
            var sections = document.getElementById('sections');

            try {
                var [itemCount, locCount, mobCount, flagCount, removalCount, equipCount] = await Promise.all([
                    fetchCount('items_db'),
                    fetchCount('itemsloc_db'),
                    fetchCount('mobs_db'),
                    fetchCount('item_flags'),
                    fetchCount('item_removals'),
                    fetchCount('equipment')
                ]);

                grid.innerHTML = `
                    <div class="stat-card"><div class="num" style="color:#44aa44;">${equipCount.toLocaleString()}</div><div class="lbl">Searchable Items (equipment)</div><div class="sub">unique by name, with parsed stats</div></div>
                    <div class="stat-card"><div class="num">${itemCount.toLocaleString()}</div><div class="lbl">Raw Rows (items_db)</div><div class="sub">${(itemCount / Math.max(equipCount, 1)).toFixed(1)} rows per searchable item</div></div>
                    <div class="stat-card"><div class="num">${locCount.toLocaleString()}</div><div class="lbl">Spawn Locations (itemsloc_db)</div><div class="sub">${(locCount / Math.max(equipCount, 1)).toFixed(1)} per searchable item</div></div>
                    <div class="stat-card"><div class="num">${mobCount.toLocaleString()}</div><div class="lbl">Mobs (mobs_db)</div><div class="sub">NPC definitions</div></div>
                    <div class="stat-card"><div class="num">${flagCount.toLocaleString()}</div><div class="lbl">Flags (item_flags)</div><div class="sub">legit / junk / skip votes</div></div>
                    <div class="stat-card"><div class="num">${removalCount.toLocaleString()}</div><div class="lbl">Removals (item_removals)</div><div class="sub">location deletions</div></div>
                `;

                var sectionsHtml = '';

                sectionsHtml += '<div class="section"><h2>Items With Most Locations</h2><table><tr><th>#</th><th>Item</th><th>Locations</th></tr>';
                var topLocs = await supabase.rpc('get_top_locations').then(function(r) {
                    if (r.data) return r.data;
                    // fallback: query raw and group
                    return null;
                });

                if (!topLocs) {
                    var locRaw = [];
                    var offset = 0;
                    var chunkSize = 1000;
                    while (true) {
                        var chunk = await supabase.from('itemsloc_db').select('itemid').range(offset, offset + chunkSize - 1);
                        var data = chunk.data || [];
                        locRaw = locRaw.concat(data);
                        if (data.length < chunkSize) break;
                        offset += chunkSize;
                    }
                    var counts = {};
                    (locRaw || []).forEach(function(x) { var k = String(x.itemid); counts[k] = (counts[k] || 0) + 1; });
                    var sorted = Object.entries(counts).sort(function(a,b) { return b[1] - a[1]; }).slice(0, 30);
                    var itemids = sorted.map(function(e) { return e[0]; });
                    var nameRes = await supabase.from('items_db').select('itemid, name').in('itemid', itemids);
                    var nameMap = {};
                    (nameRes.data || []).forEach(function(n) { nameMap[String(n.itemid)] = n.name; });
                    sorted.forEach(function(e, i) {
                        var name = nameMap[e[0]] || '(unknown #' + e[0] + ')';
                        var pct = (e[1] / locCount * 100).toFixed(1);
                        sectionsHtml += '<tr><td>' + (i+1) + '</td><td><a href="item.html?name=' + encodeURIComponent(name) + '" target="_blank">' + escHtml(name) + '</a></td><td class="num-col"><span class="mini-bar" style="width:' + Math.min(pct * 3, 200) + 'px;"></span>' + e[1].toLocaleString() + '</td></tr>';
                    });
                }
                sectionsHtml += '</table></div>';

                sectionsHtml += '<div class="section"><h2>Duplicate Items in items_db (same name, multiple itemids)</h2><table><tr><th>#</th><th>Item Name</th><th>Count</th><th>Item IDs</th></tr>';
                var itemRaw = await supabase.from('items_db').select('itemid, name').limit(50000);
                var byName = {};
                (itemRaw.data || []).forEach(function(x) {
                    if (!byName[x.name]) byName[x.name] = [];
                    byName[x.name].push(String(x.itemid));
                });
                var dups = Object.entries(byName).filter(function(e) { return e[1].length > 1; }).sort(function(a,b) { return b[1].length - a[1].length; });
                if (dups.length === 0) {
                    sectionsHtml += '<tr><td colspan="4" style="color:#555;text-align:center;">No duplicates found</td></tr>';
                } else {
                    dups.slice(0, 50).forEach(function(e, i) {
                        var ids = e[1].join(', ');
                        sectionsHtml += '<tr><td>' + (i+1) + '</td><td><a href="item.html?name=' + encodeURIComponent(e[0]) + '" target="_blank">' + escHtml(e[0]) + '</a></td><td class="num-col">' + e[1].length + '</td><td style="font-size:11px;color:#555;">' + escHtml(ids) + '</td></tr>';
                    });
                    if (dups.length > 50) {
                        sectionsHtml += '<tr><td colspan="4" style="color:#555;text-align:center;">... and ' + (dups.length - 50) + ' more</td></tr>';
                    }
                }
                sectionsHtml += '</table></div>';

                sectionsHtml += '<div class="section"><h2>Flag Summary</h2><table><tr><th>Type</th><th>Count</th></tr>';
                var flagCounts = { legit: 0, junk: 0, skip: 0 };
                var flagRaw = await supabase.from('item_flags').select('flag_type').limit(5000);
                (flagRaw.data || []).forEach(function(f) { if (flagCounts[f.flag_type] !== undefined) flagCounts[f.flag_type]++; });
                var tags = { legit: 'tag-legit', junk: 'tag-junk', skip: 'tag-skip' };
                Object.keys(flagCounts).forEach(function(k) {
                    var pct = (flagCounts[k] / Math.max(flagCount, 1) * 100).toFixed(1);
                    sectionsHtml += '<tr><td><span class="tag ' + tags[k] + '">' + k + '</span></td><td class="num-col"><span class="mini-bar" style="width:' + Math.min(pct * 3, 200) + 'px;"></span>' + flagCounts[k].toLocaleString() + ' (' + pct + '%)</td></tr>';
                });
                sectionsHtml += '</table></div>';

                sectionsHtml += '<div class="section"><h2>Items With 3+ Junk Flags (ready for auto-delete)</h2><table><tr><th>Item</th><th>Junk Count</th></tr>';
                var junkRaw = await supabase.from('item_flags').select('item_name').eq('flag_type', 'junk').limit(5000);
                var junkByName = {};
                (junkRaw.data || []).forEach(function(f) { junkByName[f.item_name] = (junkByName[f.item_name] || 0) + 1; });
                var ready = Object.entries(junkByName).filter(function(e) { return e[1] >= 3; }).sort(function(a,b) { return b[1] - a[1]; });
                if (ready.length === 0) {
                    sectionsHtml += '<tr><td colspan="2" style="color:#555;text-align:center;">None</td></tr>';
                } else {
                    ready.forEach(function(e) {
                        sectionsHtml += '<tr><td><a href="item.html?name=' + encodeURIComponent(e[0]) + '" target="_blank">' + escHtml(e[0]) + '</a></td><td class="num-col" style="color:#ff4444;">' + e[1] + '</td></tr>';
                    });
                }
                sectionsHtml += '</table></div>';

                sectionsHtml += '<div class="section"><h2>Most Recent Removals</h2><table><tr><th>Item</th><th>Reason</th><th>By</th></tr>';
                var remRaw = await supabase.from('item_removals').select('item_name, reason, removed_by').order('id', { ascending: false }).limit(20);
                (remRaw.data || []).forEach(function(r) {
                    sectionsHtml += '<tr><td>' + escHtml(r.item_name) + '</td><td><span class="tag tag-delete">' + escHtml(r.reason) + '</span></td><td style="color:#888;">' + escHtml(r.removed_by || '?') + '</td></tr>';
                });
                sectionsHtml += '</table></div>';

                sections.innerHTML = sectionsHtml;

            } catch (err) {
                grid.innerHTML = '<div class="error">Error loading stats: ' + escHtml(err.message) + '</div>';
            }
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        loadStats();
    </script>
</body>
</html>
