<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zones - MUD Equipment DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #ccc; }
        a { color: #8787FF; }
        h1 { color: #C0C0C0; }
        nav { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 0; }
        nav a { margin-right: 15px; color: #8787FF; text-decoration: none; }
        nav a:hover { color: #C0C0C0; }
        nav .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        nav .dropbtn { cursor: pointer; color: #8787FF; }
        nav .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 160px; border: 1px solid #444; border-radius: 3px; z-index: 1000; }
        nav .dropdown-content a { display: block; padding: 8px 12px; margin: 0; white-space: nowrap; }
        nav .dropdown-content a:hover { background: #444; color: #C0C0C0; }
        nav .dropdown:hover .dropdown-content { display: block; }
        .search-row { display: flex; gap: 8px; margin: 15px 0; }
        .search-row input { padding: 8px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; width: 250px; }
        .search-row button { padding: 8px 14px; background: #8787FF; color: #000; border: none; border-radius: 3px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #333; color: #888; padding: 8px; text-align: left; font-size: 13px; border: 1px solid #444; cursor: pointer; user-select: none; }
        th:hover { color: #ccc; }
        td { padding: 7px 8px; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
        tr:hover td { background: #222; }
        .bar-wrap { background: #333; border-radius: 2px; height: 6px; width: 100px; display: inline-block; vertical-align: middle; }
        .bar-fill { background: #8787FF; height: 6px; border-radius: 2px; }
        .sort-arrow { font-size: 10px; color: #8787FF; margin-left: 3px; }
        .empty { color: #555; padding: 30px 0; text-align: center; }
        #sticky-header { position: sticky; top: 0; z-index: 100; background: #1a1a1a; }
    </style>
</head>
<body>
    <div style="margin-bottom:6px;text-align:center;"><img src="images/logo.png" alt="HukoDB" style="height:130px;"></div>
    <div id="sticky-header">
    <nav>
        <a href="index.html">Search</a>
        <a href="zones.html">Zones</a>
        <a href="leaderboard.html">Leaderboard</a>
        
        <div class="dropdown">
            <span class="dropbtn">Games ▼</span>
            <div class="dropdown-content">
                <a href="daily.html">Daily</a>
                <a href="zonequiz.html">Zone Quiz</a>
                <a href="mobguess.html">Mob Guess</a>
            </div>
        </div>

        <div class="dropdown">
            <span class="dropbtn">Community Tools ▼</span>
            <div class="dropdown-content">
                <a href="market.html">Market</a>
                <a href="lfg.html">LFG</a>
            </div>
        </div>
        <div class="dropdown">
            <span class="dropbtn">More ▼</span>
            <div class="dropdown-content">
                <a href="info.html">About</a>
                <a href="ideas.html">Ideas</a>
            </div>
        </div>
        <div class="dropdown" id="editor-dropdown" style="display:none;">
            <span class="dropbtn">Editor ▼</span>
            <div class="dropdown-content">
                <a href="import.html">Add Equipment</a>
                <a href="batch.html">Batch Import</a>
                <a href="import-db.html">Import Database</a>
            </div>
        </div>
        <span id="login-link"><a href="login.html">Login</a></span>
        <span id="signup-link"><a href="signup.html" style="color:#44aa44;">Sign Up</a></span>
        <span id="admin-link" style="display:none;"><a href="admin.html" style="color:#FFD700;font-weight:bold;">Admin Panel</a></span>
        <span id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></span>
    </nav>
    <script>document.querySelectorAll('nav a').forEach(function(a){if(a.href.split('/').pop()===location.pathname.split('/').pop())a.style.color='#00FFFF';});</script>
    </div>

    <h2>Zones</h2>
    <p style="color:#888;font-size:13px;">All zones with documented mobs or items. Click a zone to explore.</p>

    <div class="search-row">
        <input type="text" id="zone-search" placeholder="Filter zones..." oninput="filterZones(this.value)">
    </div>

    <p id="zone-count" style="color:#888;font-size:13px;"></p>
    <table id="zone-table">
        <thead>
            <tr>
                <th onclick="sortBy('area')">Zone <span class="sort-arrow" id="sort-area">▼</span></th>
                <th onclick="sortBy('mobs')" style="width:120px;">Mobs <span class="sort-arrow" id="sort-mobs"></span></th>
                <th onclick="sortBy('items')" style="width:120px;">Items <span class="sort-arrow" id="sort-items"></span></th>
            </tr>
        </thead>
        <tbody id="zone-tbody"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
    </table>

    <script type="module">
        var SUPABASE_URL = 'https://fpvwpxtsrmrmdvnswrzx.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdndweHRzcm1ybWR2bnN3cnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzkyNTksImV4cCI6MjA5Mzg1NTI1OX0.gxsUTibmHHUhPydl9DTjpjfjGIghjW8WwGyIlAbFgMY';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var allZones = [];
        var filtered = [];
        var sortCol = 'mobs';
        var sortDir = -1;
        var maxMobs = 1, maxItems = 1;

        async function loadZones() {
            var [mobResult, itemResult] = await Promise.all([
                supabase.rpc('get_zone_mob_counts'),
                supabase.rpc('get_zone_item_counts')
            ]);

            var mobCounts = {};
            (mobResult.data || []).forEach(function(r) { mobCounts[r.area] = r.mobs; });

            var itemCounts = {};
            (itemResult.data || []).forEach(function(r) { itemCounts[r.area] = r.items; });

            var areaSet = new Set([...Object.keys(mobCounts), ...Object.keys(itemCounts)]);
            allZones = [];
            areaSet.forEach(function(area) {
                allZones.push({
                    area:  area,
                    mobs:  mobCounts[area]  || 0,
                    items: itemCounts[area] || 0
                });
            });

            maxMobs  = Math.max.apply(null, allZones.map(function(z) { return z.mobs;  })) || 1;
            maxItems = Math.max.apply(null, allZones.map(function(z) { return z.items; })) || 1;

            filtered = allZones.slice();
            sortAndRender();
        }

        window.filterZones = function(val) {
            var lower = val.toLowerCase();
            filtered = allZones.filter(function(z) { return z.area.toLowerCase().indexOf(lower) >= 0; });
            sortAndRender();
        };

        window.sortBy = function(col) {
            if (sortCol === col) { sortDir *= -1; }
            else { sortCol = col; sortDir = col === 'area' ? 1 : -1; }
            sortAndRender();
        };

        function sortAndRender() {
            filtered.sort(function(a, b) {
                if (sortCol === 'area') return sortDir * a.area.localeCompare(b.area);
                return sortDir * (a[sortCol] - b[sortCol]);
            });

            ['area','mobs','items'].forEach(function(c) {
                var el = document.getElementById('sort-' + c);
                if (el) el.textContent = sortCol === c ? (sortDir === -1 ? '▼' : '▲') : '';
            });

            var tbody = document.getElementById('zone-tbody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty">No zones found.</td></tr>';
                document.getElementById('zone-count').textContent = '';
                return;
            }

            document.getElementById('zone-count').textContent = filtered.length + ' zones';

            filtered.forEach(function(z) {
                var tr = document.createElement('tr');
                var mobPct  = maxMobs  > 0 ? Math.round(z.mobs  / maxMobs  * 100) : 0;
                var itemPct = maxItems > 0 ? Math.round(z.items / maxItems * 100) : 0;
                tr.innerHTML = '<td><a href="zone.html?area=' + encodeURIComponent(z.area) + '">' + escHtml(z.area) + '</a></td>'
                    + '<td>' + z.mobs  + ' <span class="bar-wrap"><span class="bar-fill" style="width:' + mobPct  + '%;"></span></span></td>'
                    + '<td>' + z.items + ' <span class="bar-wrap"><span class="bar-fill" style="width:' + itemPct + '%;background:#44aa44;"></span></span></td>';
                tbody.appendChild(tr);
            });
        }

        function escHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        loadZones();
    </script>

    <script>
        if (sessionStorage.getItem('editor_logged_in') === 'true') {
            document.getElementById('editor-dropdown').style.display = 'inline-block';
            document.getElementById('admin-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('login-link').style.display = 'none';
        }
                if (localStorage.getItem('user_logged_in') === 'true') {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('signup-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
        }
        function logout() {
            sessionStorage.removeItem('editor_logged_in');
            sessionStorage.removeItem('editor_name');
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('username');
            location.reload();
        }
    </script>
</body>
</html>
